# WTG — native binary build + self-hosted runner deploy (docker 미사용).
#
# 흐름:
#   master push → test → build (linux/amd64 static binary, ubuntu-latest)
#              → artifact 전달 → deploy (self-hosted runner on EC2)
#              → /home/winway/nh-fxallone-server/wtg 설치 + systemctl restart
#
# 왜 native:
#   - EC2 에는 docker 를 쓰지 않는다 (운영 결정). Go 는 cgo 없는 static
#     binary 라 GitHub-hosted 에서 크로스 빌드 → artifact 로 전달하면
#     EC2 에는 Go toolchain 도 불필요.
#   - 서비스는 systemd unit (deploy/ec2/*.service, User=winway) 으로 상주.
#     etcd 도 native 바이너리 (setup-ec2.sh 가 1회 설치).
#
# 왜 self-hosted:
#   - EC2 는 private IP + 사내 CIDR 만 접근. GitHub-hosted runner 는 수천
#     public IP 대역이라 SG 관리 불가. runner 는 EC2 안 (rocky, sudoer).
#
# 필요 GitHub Secrets:
#   FIX_PUSH_SECRET  — mci-edge-fix drop copy 인증

name: Deploy to EC2

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'CLAUDE.md'
  workflow_dispatch:

concurrency:
  # cancel-in-progress: true — 새 push 가 오면 진행/대기 중인 이전 run 을
  # 취소한다. false 로 큐잉하면 뒤늦게 끝난 옛 run 이 최신 배포를 덮어써
  # stale 바이너리가 배포되는 사고가 있었다 (2026-07-15). 항상 최신만 배포.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  WTG_HOME: /home/winway/nh-fxallone-server/wtg
  DEPLOY_USER: winway

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: staticcheck / vet / fmt
        run: make lint
      - name: unit + race
        run: make test-race

  build:
    name: Build (linux/amd64 native)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build static binaries
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 make build

      # zip artifact 는 실행권한을 보존하지 않으므로 deploy 쪽에서 install -m 0755 로 복원.
      - uses: actions/upload-artifact@v4
        with:
          name: wtg-bin
          path: build/bin/
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to EC2 (self-hosted)
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: wtg-bin
          path: artifact/bin

      # 실행 중인 바이너리는 덮어쓸 수 없으므로 (text file busy) 먼저 정지.
      # etcd 는 바이너리가 안 바뀌므로 유지 — 데이터/watch 연속성 보존.
      - name: Stop WTG services
        run: |
          set -euo pipefail
          sudo systemctl stop 'wtg-mci-*' 'wtg-quote-*' 'wtg-dev-*'

      - name: 구 이름 unit 정리 (rename orphan — edge-fix/md → fix-ord/fix-md)
        run: |
          set -euo pipefail
          for old in wtg-mci-edge-fix wtg-mci-edge-md; do
            sudo systemctl disable --now "$old" 2>/dev/null || true
            sudo rm -f "/etc/systemd/system/$old.service"
          done
          sudo systemctl daemon-reload

      - name: Install binaries + etc + systemd units
        run: |
          set -euo pipefail
          sudo install -d -o "$DEPLOY_USER" -g "$DEPLOY_USER" \
            "$WTG_HOME" "$WTG_HOME/bin" "$WTG_HOME/etc" \
            "$WTG_HOME/data/etcd" "$WTG_HOME/data/fix"

          # 롤백용 직전 바이너리 백업 (bin.prev)
          if [ -n "$(ls -A "$WTG_HOME/bin" 2>/dev/null)" ]; then
            sudo rm -rf "$WTG_HOME/bin.prev"
            sudo cp -a "$WTG_HOME/bin" "$WTG_HOME/bin.prev"
          fi

          sudo install -m 0755 -o "$DEPLOY_USER" -g "$DEPLOY_USER" \
            artifact/bin/* "$WTG_HOME/bin/"
          sudo cp -r etc/. "$WTG_HOME/etc/"
          echo "${GITHUB_SHA::7}" | sudo tee "$WTG_HOME/VERSION" >/dev/null
          sudo chown -R "$DEPLOY_USER":"$DEPLOY_USER" "$WTG_HOME/etc" "$WTG_HOME/VERSION"

          # 전체 소스 미러 (.git 포함) — 서버에서 열람 / git log / diff 용.
          # artifact (다운로드한 바이너리) 만 제외. --delete 로 삭제 파일도 동기화.
          sudo rsync -a --delete --exclude=/artifact \
            --chown="$DEPLOY_USER":"$DEPLOY_USER" ./ "$WTG_HOME/src/"

          sudo cp deploy/ec2/wtg-*.service /etc/systemd/system/
          sudo systemctl daemon-reload

      - name: Write env file
        env:
          FIX_PUSH_SECRET_ENV: ${{ secrets.FIX_PUSH_SECRET }}
        run: |
          set -euo pipefail
          umask 077
          tmp=$(mktemp)
          printf 'BROKER_HOST=127.0.0.1\nBROKER_PORT=11217\nFIX_PUSH_SECRET=%s\n' \
            "$FIX_PUSH_SECRET_ENV" > "$tmp"
          sudo install -m 0600 -o "$DEPLOY_USER" -g "$DEPLOY_USER" "$tmp" "$WTG_HOME/wtg.env"
          rm -f "$tmp"

      # SELinux (Rocky 9 Enforcing): 홈 안에 새로 쓴 파일은 user_home_t 라
      # systemd 가 exec/read 거부. setup-ec2.sh 가 등록한 fcontext 룰
      # (bin_t / etc_t / var_lib_t) 을 매 배포 후 재적용.
      # cside C SDK 재빌드 — 소스 미러 rsync --delete 가 빌드 산출물 (.a) 을
      # 지우는데, win/src (trn/lib) 빌드가 libwtgprice.a/libwtgpush.a 에
      # 의존하므로 매 배포 후 재생성 (-fPIC — libwwstr.so 편입 요건).
      - name: cside SDK 빌드
        run: |
          set -euo pipefail
          for d in wtgprice wtgpush; do
            sudo -u "$DEPLOY_USER" make -C "$WTG_HOME/src/cside/$d" >/dev/null
          done

      - name: SELinux 라벨 복원
        run: |
          set -euo pipefail
          if command -v restorecon >/dev/null 2>&1; then
            sudo restorecon -R "$WTG_HOME"
          fi

      - name: Start services
        run: |
          set -euo pipefail
          sudo systemctl enable --now wtg-etcd
          sudo systemctl enable --now \
            wtg-mci-price wtg-mci-edge-price wtg-mci-admin \
            wtg-mci-api wtg-mci-edge-api wtg-mci-edge-fix-ord wtg-mci-edge-fix-md \
            wtg-mci-edge-tcp wtg-mci-push wtg-mci-edge-push \
            wtg-quote-forwarder wtg-dev-feed
          # wtg-mci-mds-shim 은 조건부 자산 — unit 은 설치되지만 enable 하지 않음.
          # 재빌드 불가 client 가 인벤토리에서 확인되면 목록에 복귀 (mds-replacement-plan Stage 2)

      # 설치된 바이너리가 이 커밋으로 빌드됐는지 검증 — stale artifact 를
      # 조용히 성공시키지 않고 배포 실패로 잡는다 (2026-07-15 사고 방어).
      - name: Verify deployed binary SHA
        run: |
          set -euo pipefail
          want="${GITHUB_SHA::7}"
          got="$("$WTG_HOME/bin/mci-admin" --version 2>/dev/null || echo MISSING)"
          echo "expected=$want installed=$got"
          if [ "$got" != "$want" ]; then
            echo "::error::설치 바이너리 SHA 불일치 (stale artifact) — expected=$want got=$got"
            exit 1
          fi

      - name: Health check
        run: |
          set -euo pipefail
          sleep 5
          for svc in wtg-etcd wtg-mci-price wtg-mci-edge-price wtg-mci-admin \
                     wtg-mci-api wtg-mci-edge-api wtg-mci-edge-fix-ord wtg-mci-edge-fix-md \
                     wtg-mci-edge-tcp wtg-mci-push wtg-mci-edge-push \
                     wtg-quote-forwarder wtg-dev-feed; do
            if ! sudo systemctl is-active --quiet "$svc"; then
              echo "::error::$svc inactive — 최근 로그:"
              sudo journalctl -u "$svc" -n 40 --no-pager
              exit 1
            fi
            echo "  $svc active"
          done

          sleep 25
          echo "=== endpoint check ==="
          fail=0
          for url in \
            http://127.0.0.1:9090/ \
            http://127.0.0.1:8082/v1/price-stats \
            http://127.0.0.1:8083/metrics \
            http://127.0.0.1:5002/stats \
            http://127.0.0.1:5012/stats \
            http://127.0.0.1:9091/metrics \
            https://127.0.0.1:8090/v1/ping \
            http://127.0.0.1:5022/healthz \
            http://127.0.0.1:8081/v1/ping \
            http://127.0.0.1:8084/v1/ping \
          ; do
            code=$(curl -sk -o /dev/null -w "%{http_code}" -m 3 "$url" || echo "ERR")
            printf "  %-45s HTTP %s\n" "$url" "$code"
            [ "$code" = "200" ] || fail=1
          done
          exit $fail
