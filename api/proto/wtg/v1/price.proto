// WTG (Winway Trading Gateway) — Price stream service.
//
// Internal mci-price ↔ DMZ mci-edge-price 사이의 gRPC bidirectional stream.
// 시세 fan-out 의 핵심 통신 채널.
//
// 보안: mTLS gRPC (Phase 8 운영화 시점). DMZ → Internal 정방향만 정책상
// 허용되므로, edge 가 Internal 로 connect 하고 Internal 이 그 stream 으로
// tick 을 push 하는 reverse stream 패턴.

syntax = "proto3";

package wtg.v1;

option go_package = "github.com/winwaysystems/wtg/pkg/wtgpb/v1;wtgpbv1";

// PriceService 는 mci-price (Internal) 가 노출하는 gRPC 서비스다.
service PriceService {
  // Subscribe 는 edge 가 호출해서 Internal 로부터 raw tick stream 을 받는다.
  // 마진 적용 전 시세 — 디버깅 / 모니터링 / 전체 broadcast 용.
  rpc Subscribe(SubscribeRequest) returns (stream Tick);

  // SubscribeQuote 는 edge 가 호출해서 Internal 로부터 마진 적용된 Profile 별
  // CustomerQuote stream 을 받는다. mci-price 의 PricingConsumer 가 publish 하는
  // 동일 데이터를 broker 외에 이 stream 으로도 push (이중 publish).
  rpc SubscribeQuote(QuoteSubscribeRequest) returns (stream CustomerQuote);

  // SubscribeBar 는 mci-chart 가 호출해서 봉 close 이벤트 stream 을 받는다.
  // Aggregator 가 closed 한 봉이 Archiver(DB) 와 병렬로 이 stream 으로도 push.
  // 클라이언트(mci-chart)는 (pair, tf) 필터를 옵션으로 지정.
  rpc SubscribeBar(BarSubscribeRequest) returns (stream Bar);

  // PublishTick 은 quote-forwarder 가 호출해서 mci-price 에 시세를 직접 push 하는
  // 양방향 stream. broker 의 PRICE exchange fan-out 을 우회 — broker 가 매매
  // transaction 에만 집중하도록 시세 부하를 분리한다.
  //
  // 흐름:
  //   forwarder (gRPC client) ─→ stream Tick ─→ mci-price (gRPC server)
  //                                                │
  //                                                └─→ BestConsumer / Aggregator / PricingConsumer
  //
  // ack: 주기적 (batch) 으로 server 가 publisher 에 ack 회신 — backpressure / 통계용.
  rpc PublishTick(stream Tick) returns (stream PublishAck);
}

// PublishAck — PublishTick stream 의 주기 응답. server 가 받은 tick 수와
// 마지막 처리 시각을 알려 publisher 가 backpressure / 끊김 진단에 활용.
message PublishAck {
  // 본 stream 에서 server 가 누적 처리한 tick 수.
  uint64 accepted = 1;
  // 본 stream 에서 server 가 drop 한 tick 수 (backpressure / 검증 실패 등).
  uint64 dropped = 2;
  // 마지막 ack 시점의 server unix nano.
  int64 server_unix_nano = 3;
}

// SubscribeRequest 는 edge 가 보내는 구독 옵션 (1차는 빈 메시지).
message SubscribeRequest {
  // 구독 대상 통화쌍 화이트리스트. 비어있으면 모든 심볼 수신.
  repeated string symbols = 1;

  // 구독자 식별 (edge instance 이름 등 — 디버깅/감사용).
  string subscriber_id = 2;
}

// Tick 은 정규화된 시세 단위.
//
// internal/price/decoder.go 의 Tick 구조와 1:1 대응. wire 호환성은
// proto 가 단일 출처이며 Go 측 struct 는 변환 코드로 매핑.
message Tick {
  uint64 market_id = 1;
  string symbol = 2;
  uint32 seq_num = 3;
  uint32 mask = 4;
  uint32 type = 5;     // pushmsg.type (uint8 → uint32 wrap)
  uint32 flag = 6;     // pushmsg.flag (uint8 → uint32 wrap)

  // body 는 cooker 의 시세 페이로드 raw bytes.
  // edge 는 그대로 ws 클라이언트로 forward — 해석하지 않음 (passthrough 원칙).
  bytes body = 7;

  // mci-price 가 디코딩한 wallclock (Unix nano). 디버깅/지연 측정용.
  int64 received_unix_nano = 8;
}

// QuoteSubscribeRequest 는 edge 가 CustomerQuote stream 을 구독할 때 보내는 옵션.
message QuoteSubscribeRequest {
  // edge instance 식별 (디버깅/감사용).
  string subscriber_id = 1;

  // 수신할 Profile 화이트리스트 (예: "WEB.BRANCH.VIP").
  // 비어있으면 모든 Profile 수신 — edge 가 사용자별 분기 책임.
  repeated string profile_keys = 2;

  // 수신할 통화쌍 화이트리스트. 비어있으면 모든 pair.
  repeated string pairs = 3;
}

// BarSubscribeRequest 는 mci-chart 가 봉 stream 을 구독할 때 보내는 옵션.
message BarSubscribeRequest {
  string subscriber_id = 1;

  // 수신할 timeframe 화이트리스트 (예: "1m", "5m"). 비면 모두.
  repeated string timeframes = 2;
  // 수신할 통화쌍 화이트리스트. 비면 모두.
  repeated string pairs = 3;
}

// Bar 는 closed 된 OHLC 봉. quote.Bar 와 1:1 대응.
message Bar {
  string pair       = 1;
  string tf         = 2;   // "1m" / "5m" / ...
  int64  opened_unix_nano = 3;
  int64  closed_unix_nano = 4;

  double open_bid  = 5;
  double open_ask  = 6;
  double high_bid  = 7;
  double high_ask  = 8;
  double low_bid   = 9;
  double low_ask   = 10;
  double close_bid = 11;
  double close_ask = 12;

  int32 tick_count = 13;
}

// CustomerQuote 는 마진 적용된 고객 노출 시세.
// pkg/pricing.CustomerQuote 와 1:1 대응. profile 정보는 edge fan-out 분기에 사용.
message CustomerQuote {
  string pair    = 1;
  string channel = 2;  // session.Channel ("WEB"/"MOB"/"CS"/"FIX"/"ADM")
  string site    = 3;  // session.Site ("BRANCH"/"HQ")
  string tier    = 4;  // session.Tier ("VIP"/"GOLD"/"STD"...)
  string tenor   = 5;  // "SPOT" / "1W" / "1M" ...

  double bid = 6;
  double ask = 7;

  // 시세 wallclock (Unix nano). raw 시점 timestamp 유지.
  int64 ts_unix_nano = 8;

  // 감사·재현용 — 산출 근거가 된 raw 값과 적용된 PricingTable.Version.
  double raw_bid       = 9;
  double raw_ask       = 10;
  int64  table_version = 11;

  // QuoteID — FIX 4.4 tag 117 호환 식별자. mci-price 발행, 매칭 엔진이
  // pkg/quoteid.Registry 로 검증 시 사용한다. 빈값이면 quoteid 비활성.
  string quote_id = 12;

  // ValidUntil — 토큰 만료 wallclock (Unix nano). 이 시점 이후 엔진은
  // 토큰을 거절해야 한다 (FX Global Code Principle 17 — last-look 한계).
  int64  valid_until_unix_nano = 13;
}
