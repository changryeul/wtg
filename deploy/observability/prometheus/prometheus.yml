# WTG Prometheus scrape config (dev).
# 운영에서는 mci-price 가 별도 host 면 targets 수정.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: dev

scrape_configs:
  # mci-price /metrics — P6 (cross/pricing/master) + quoteid + http + broker.
  # 다중 인스턴스 운영 시 각 target 에 instance label 추가 — docs/mci-price-ha.md §3.
  - job_name: mci-price
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          service: mci-price
          # instance: "1"   # 다중 인스턴스 시 식별
      # 두번째 인스턴스 예시:
      # - targets: ["host.docker.internal:8092"]
      #   labels:
      #     service: mci-price
      #     instance: "2"

  # quote-forwarder /metrics — feed별 throughput / drop.
  - job_name: quote-forwarder
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          service: quote-forwarder

  # mci-edge-price /metrics (rate limit + http + auth).
  - job_name: mci-edge-price
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          service: mci-edge-price

  # mci-edge-push /metrics.
  - job_name: mci-edge-push
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:8084"]
        labels:
          service: mci-edge-push

  # mci-edge-chart /metrics.
  - job_name: mci-edge-chart
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:8087"]
        labels:
          service: mci-edge-chart

  # mci-edge-api /metrics — P7-A rate limit + auth + http.
  - job_name: mci-edge-api
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:8090"]
        labels:
          service: mci-edge-api

  # Prometheus 자기 자신.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
