// QuoteValidationService — 매칭 엔진이 NewOrderSingle (FIX 'D') 의 QuoteID
// (FIX 4.4 tag 117) 를 검증하기 위해 호출하는 RPC.
//
// 설계 / 정책 분담 / 호출 흐름은 docs/quoteid-validation-rfc.md 참조.
//
// 정합성:
//   FIX 4.4    — tag 117 (QuoteID), tag 62 (ValidUntilTime), tag 103 (OrdRejReason)
//   FX Global Code 2024 Principle 17 — last-look 투명성
//   MiFID II RTS 27 — best-execution audit trail

syntax = "proto3";

package wtg.v1;

option go_package = "github.com/winwaysystems/wtg/pkg/wtgpb/v1;wtgpbv1";

service QuoteValidationService {
  // Validate 는 QuoteID 의 권위 데이터를 read-only 로 조회한다. 멱등 — 같은
  // QuoteID 를 여러 번 호출해도 동일 결과.
  //
  // WTG (mci-price) 가 담당:
  //   - 존재 여부 (NOT_FOUND)
  //   - 만료 여부 (EXPIRED — ValidUntil + grace 도래 후)
  //   - 사용 여부 (ALREADY_CONSUMED — 다른 주문이 이미 체결에 사용)
  //   - 발행 시점 가격 / Profile / Issuer echo
  //
  // 엔진이 담당 (본 RPC 의 응답 + 엔진 자체 정책):
  //   - side validation (FIX tag 54: BUY=ask vs SELL=bid)
  //   - slippage tolerance (tier별)
  //   - last-look hold-time (FX Global Code Principle 17, tier별)
  //   - 사용자 ↔ Profile 일치
  //   - 잔량 / 한도
  rpc Validate(ValidateRequest) returns (ValidateResponse);

  // MarkConsumed 는 QuoteID 의 "사용 완료" 를 원자적으로 표시한다.
  //
  // FX Global Code Principle 17 의 "use only once" 정합 — 한 QuoteID 는
  // 단 한 번의 체결에 묶여야 한다 (replay 방지). EBS Direct / LMAX / CME FX
  // 모두 server-side consumption tracking.
  //
  // 엔진 흐름:
  //   1. Validate(quote_id) → OK + record
  //   2. 자체 정책 검사 (slippage / side / 한도)
  //   3. MarkConsumed(quote_id, consumer="order-N")
  //      - result == OK         → 체결 진행
  //      - result == ALREADY_CONSUMED → 동시에 다른 주문이 잡음, 거절
  //      - result == NOT_FOUND  → record GC 됨 (드물게 race)
  //      - result == EXPIRED    → ValidUntil 도래, 체결 불가
  //   4. 체결 후 ExecutionReport.
  //
  // 원자성: Memory 는 mutex, Redis 는 SET NX. 두 mci-price 가 동시에 같은
  // QuoteID 에 대해 MarkConsumed 받아도 정확히 한 호출만 OK.
  rpc MarkConsumed(MarkConsumedRequest) returns (MarkConsumedResponse);

  // BatchValidate 는 여러 QuoteID 를 단일 RPC 로 검증. 결과는 입력과 같은
  // 순서의 배열로 반환 (results[i] == quote_ids[i] 의 결과).
  //
  // 사용 시나리오:
  //   - 다건 주문 (FIX NewOrderList 'E') 의 전체 사전 검증.
  //   - 감사 / 재계산 잡의 bulk lookup.
  //
  // 서버는 goroutine fan-out 으로 병렬 처리 — N=100 batch 가 단일 Validate
  // 와 비슷한 wallclock 으로 끝남. batch 크기 상한은 1000 (운영 abuse 방어).
  rpc BatchValidate(BatchValidateRequest) returns (BatchValidateResponse);

  // BatchMarkConsumed — 여러 (quote_id, consumer_id) 쌍을 한 RPC 로 표시.
  // 각 항목은 독립적으로 atomic (Memory mutex / Redis SET NX) — partial 결과
  // 가능 (일부 OK, 일부 ALREADY_CONSUMED). 결과는 입력 순서와 동일한 배열.
  //
  // FIX NewOrderList ('E') 다건 주문 fill 직전 한 번에 표시 — 직렬 호출
  // 대비 N× wallclock 개선 (goroutine fan-out 으로 Redis round-trip 병렬화).
  rpc BatchMarkConsumed(BatchMarkConsumedRequest) returns (BatchMarkConsumedResponse);

  // Phase S3-c — FX swap (near+far 2-leg) 의 swap_id 동시 검증.
  //
  // 매매 AP 가 swap_id 1개를 보내면 WTG 가:
  //   1. SwapIndex.GetSwap(swap_id) → (near_id, far_id)
  //   2. Registry.LookupMany([near_id, far_id]) → 두 leg 동시 검증
  //   3. AND 정책 — 둘 다 OK 여야 OK. 어느 한 쪽이라도 NOT_FOUND / EXPIRED /
  //      ALREADY_CONSUMED 면 전체 거부. 한 leg 가 valid 한데 다른 leg 가 못 쓰면
  //      위험 (반쪽만 체결) — 결과는 swap_status 로 묶어 반환.
  //
  // 본 RPC 자체는 read-only. 매매 AP 는 검증 통과 시 ConsumeSwap 로 동시 표시.
  rpc ValidateSwap(ValidateSwapRequest) returns (ValidateSwapResponse);

  // ConsumeSwap — swap_id 의 두 leg quote_id 를 한 번에 표시. AND 원자성:
  //   · 둘 다 OK 가능 시 → 둘 다 표시 + status=OK
  //   · 한 쪽이라도 표시 불가 → 표시 시도 X (atomic-skip) + status=AlREADY/EXPIRED/NOT_FOUND
  //
  // 구현 노트:
  //   1단계: ValidateSwap 와 동일한 LookupMany 로 사전 검사.
  //   2단계: 둘 다 OK 면 MarkConsumedMany 호출 — race 보호.
  //   2단계 race: 두 mci-price 가 동시 ConsumeSwap 받아 사전검사 통과해도
  //              MarkConsumed 의 SET NX 가 정확히 한 호출만 OK 반환. 다른
  //              쪽은 ALREADY_CONSUMED — 그 응답을 받은 호출자는 자기쪽 leg
  //              revoke (best-effort). 따라서 호출자 (매매 AP) 는 status !=
  //              OK 응답을 받으면 그 거래는 거부.
  //
  // FX Global Code Principle 17 — "use only once" 적용 단위가 swap_id.
  rpc ConsumeSwap(ConsumeSwapRequest) returns (ConsumeSwapResponse);
}

message ValidateRequest {
  // FIX tag 117 — 클라이언트 NewOrderSingle 이 들고온 QuoteID 그대로.
  string quote_id = 1;

  // 엔진 식별 — audit 로깅 / 통계용. 사전 등록된 식별자 사용 권장
  // (예: "matching-engine-A"). RFC §10.3.
  string engine_id = 10;

  // RPC 발신 wallclock (Unix nano) — clock skew 모니터링용.
  int64 ts_unix_nano = 11;
}

message ValidateResponse {
  ValidationStatus status = 1;

  // status == OK 일 때만 채워진다. 엔진은 record.bid / record.ask 를
  // 자체 정책 검증의 입력으로 사용.
  QuoteRecord record = 2;

  // FIX OrdRejReason (tag 103). status != OK 일 때 채워짐.
  // 엔진은 ExecutionReport(8) 에 그대로 전달 가능 — 감독당국 호환.
  int32 ord_rej_reason = 3;

  // 사람용 reject 설명 (감독당국 로그 / debugging 보조).
  string reject_text = 4;
}

enum ValidationStatus {
  STATUS_UNSPECIFIED = 0;
  // 발행 기록 존재, 아직 ValidUntil 도래 X, 아직 사용 안 됨 — 거래 가능.
  OK = 1;
  // Registry 에 없음. 한 번도 발행 안 됐거나 ValidUntil + grace 후 GC.
  NOT_FOUND = 2;
  // ValidUntil 도래 후 grace 안 (기록은 있지만 거래 불가).
  EXPIRED = 3;
  // 이미 MarkConsumed 호출됨 — 다른 주문이 이 QuoteID 를 사용했다.
  ALREADY_CONSUMED = 4;
}

message MarkConsumedRequest {
  string quote_id = 1;

  // 누가 사용했는지 — audit. 보통 OrderID 등 엔진 내부 식별자.
  string consumer_id = 2;

  // 호출자(엔진) 식별 — Validate 와 동일.
  string engine_id    = 10;
  int64  ts_unix_nano = 11;
}

message BatchValidateRequest {
  // 검증할 QuoteID 목록. 빈 배열이면 빈 results 반환. 1000 초과시 InvalidArgument.
  repeated string quote_ids = 1;

  // Validate 와 동일한 컨텍스트 필드 — batch 전체에 적용.
  string engine_id    = 10;
  int64  ts_unix_nano = 11;
}

message BatchValidateResponse {
  // results[i] 는 request.quote_ids[i] 의 검증 결과. 길이는 입력과 동일.
  // 개별 항목의 status 가 각 quote_id 에 대한 분기 — 일부 OK 일부 NOT_FOUND
  // 처럼 혼재 가능.
  repeated ValidateResponse results = 1;
}

// ConsumeItem — BatchMarkConsumed 한 항목.
message ConsumeItem {
  string quote_id    = 1;
  string consumer_id = 2;
}

message BatchMarkConsumedRequest {
  // 표시할 (quote_id, consumer_id) 항목들. 빈 배열이면 빈 results 반환.
  // 1000 초과 시 InvalidArgument.
  repeated ConsumeItem items = 1;

  string engine_id    = 10;
  int64  ts_unix_nano = 11;
}

message BatchMarkConsumedResponse {
  // results[i] 는 request.items[i] 의 표시 결과. 길이는 입력과 동일.
  repeated MarkConsumedResponse results = 1;
}

message MarkConsumedResponse {
  // ConsumeResult — 원자적 결과.
  //   OK               : 이 호출이 처음 표시 — 체결 진행.
  //   ALREADY_CONSUMED : 다른 호출이 먼저 표시했다 — 거절.
  //   NOT_FOUND        : record 없음 (GC 또는 한 번도 발행 안 됨).
  //   EXPIRED          : ValidUntil 도래 — 표시 시도해도 거래 불가.
  ValidationStatus status = 1;

  // OK / ALREADY_CONSUMED 시 채워짐. NOT_FOUND 는 비어있음.
  QuoteRecord record = 2;

  // ALREADY_CONSUMED 시: 먼저 표시한 consumer_id (감사용).
  string consumed_by = 3;

  // FIX OrdRejReason (tag 103) 매핑.
  int32  ord_rej_reason = 4;
  string reject_text    = 5;
}

// ValidateSwapRequest — swap_id 한 개로 두 leg 동시 검증.
message ValidateSwapRequest {
  string swap_id      = 1;
  string engine_id    = 10;
  int64  ts_unix_nano = 11;
}

// ValidateSwapResponse — swap 단위 결과 + 개별 leg 결과.
//
//   swap_status:
//     OK              : 두 leg 모두 OK — 거래 가능.
//     NOT_FOUND       : swap_id 자체 미존재 / 만료.
//     EXPIRED         : 두 leg 중 하나라도 EXPIRED.
//     ALREADY_CONSUMED: 두 leg 중 하나라도 ALREADY_CONSUMED.
//   near / far : 개별 leg 의 ValidateResponse (audit + reject 이유 추적).
message ValidateSwapResponse {
  ValidationStatus swap_status = 1;
  ValidateResponse near        = 2;
  ValidateResponse far         = 3;
  int32  ord_rej_reason        = 4;
  string reject_text           = 5;
}

// ConsumeSwapRequest — 두 leg 동시 표시.
message ConsumeSwapRequest {
  string swap_id     = 1;
  string consumer_id = 2;  // 매매 AP 의 거래 식별자 (OrderID 등)
  string engine_id   = 10;
  int64  ts_unix_nano = 11;
}

// ConsumeSwapResponse — 두 leg 표시 결과. status=OK 일 때만 둘 다 OK 로 표시됨.
// status != OK 면 두 leg 중 하나 또는 둘 다 표시 안 됨 (atomic-skip).
message ConsumeSwapResponse {
  ValidationStatus swap_status = 1;
  // 개별 leg 의 MarkConsumed 결과. swap_status=OK 면 둘 다 OK.
  // partial race (한 leg 만 표시됨) 발생 시 호출자 (매매 AP) 가 거래 거부.
  MarkConsumedResponse near = 2;
  MarkConsumedResponse far  = 3;
  int32  ord_rej_reason     = 4;
  string reject_text        = 5;
}

// QuoteRecord 는 pkg/quoteid.Record 의 wire 표현.
message QuoteRecord {
  string quote_id              = 1;
  string pair                  = 2;
  string channel               = 3;  // session.Channel
  string site                  = 4;  // session.Site
  string tier                  = 5;  // session.Tier
  string tenor                 = 6;  // "SPOT" / "1W" / "1M" ...
  double bid                   = 7;
  double ask                   = 8;
  int64  issued_unix_nano      = 9;
  int64  valid_until_unix_nano = 10;
  uint64 sequence              = 11; // 인스턴스별 monotonic (FIX MsgSeqNum 동치)
  string issuer                = 12; // mci-price 인스턴스 prefix ("A" / "B")
}
