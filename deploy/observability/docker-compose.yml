# WTG 운영 메트릭 시각화 — dev/dev-ops 용 docker-compose.
#
# 사용:
#   cd deploy/observability
#   docker compose up -d
#
# Grafana: http://localhost:3030  (admin / admin — 초기 로그인 후 변경 권장)
# Prometheus: http://localhost:9095  (9090 은 mci-admin 과 충돌해 9095 사용)
# (포트 3000 / 9090 충돌 시 dev 외 다른 서비스가 점유. 변경 가능.)
#
# 종료:
#   docker compose down  (volume 보존)
#   docker compose down -v  (data 삭제)
#
# mci-price 가 host 의 :8082 에서 listen 한다고 가정 — host.docker.internal 으로 scrape.
# 운영에서는 mci-price 가 별도 host 면 prometheus.yml 의 targets 수정.

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: wtg-prometheus
    restart: unless-stopped
    ports:
      - "9095:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:10.4.2
    container_name: wtg-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=dark
      - GF_LOG_LEVEL=warn
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prom-data:
  grafana-data:
