// WTG (Winway Trading Gateway) — Price stream service.
//
// Internal mci-price ↔ DMZ mci-edge-price 사이의 gRPC bidirectional stream.
// 시세 fan-out 의 핵심 통신 채널.
//
// 보안: mTLS gRPC (Phase 8 운영화 시점). DMZ → Internal 정방향만 정책상
// 허용되므로, edge 가 Internal 로 connect 하고 Internal 이 그 stream 으로
// tick 을 push 하는 reverse stream 패턴.

syntax = "proto3";

package wtg.v1;

option go_package = "github.com/winwaysystems/wtg/pkg/wtgpb/v1;wtgpbv1";

// PriceService 는 mci-price (Internal) 가 노출하는 gRPC 서비스다.
service PriceService {
  // Subscribe 는 edge 가 호출해서 Internal 로부터 raw tick stream 을 받는다.
  // 마진 적용 전 시세 — 디버깅 / 모니터링 / 전체 broadcast 용.
  rpc Subscribe(SubscribeRequest) returns (stream Tick);

  // SubscribeQuote 는 edge 가 호출해서 Internal 로부터 마진 적용된 Profile 별
  // CustomerQuote stream 을 받는다. mci-price 의 PricingConsumer 가 publish 하는
  // 동일 데이터를 broker 외에 이 stream 으로도 push (이중 publish).
  rpc SubscribeQuote(QuoteSubscribeRequest) returns (stream CustomerQuote);

  // SubscribeBar 는 mci-chart 가 호출해서 봉 close 이벤트 stream 을 받는다.
  // Aggregator 가 closed 한 봉이 Archiver(DB) 와 병렬로 이 stream 으로도 push.
  // 클라이언트(mci-chart)는 (pair, tf) 필터를 옵션으로 지정.
  rpc SubscribeBar(BarSubscribeRequest) returns (stream Bar);

  // RegisterCustomer — Phase 4b. edge-price 가 ws 클라이언트별로 customer
  // 등록/해제 이벤트를 bidirectional stream 으로 보낸다. stream 종료 시 본
  // stream 으로 등록한 모든 customer 자동 해제 — edge 재시작 / 끊김 시 stale
  // 등록 방지.
  //
  // 흐름:
  //   edge ─ CustomerRegistration{op=REGISTER,customer_id,profile_key} ─→ server
  //   server ─ CustomerAck{ok=true} ─→ edge
  //   ...
  //   edge ─ CustomerRegistration{op=UNREGISTER,customer_id} ─→ server
  //   ... (stream 유지 — ws 클라이언트 여러 개)
  //   edge disconnect → server 가 등록 set 전체 unregister
  rpc RegisterCustomer(stream CustomerRegistration) returns (stream CustomerAck);

  // SubscribeCustomerQuote — Phase 4b. customer-tag 된 quote stream.
  // PricingConsumer 의 customer fan-out 결과를 받는다. Profile-only quote
  // (SubscribeQuote) 와 분리 — customer_id 기반 필터링 단순화.
  rpc SubscribeCustomerQuote(CustomerQuoteSubscribeRequest) returns (stream CustomerQuote);

  // PublishTick 은 quote-forwarder 가 호출해서 mci-price 에 시세를 직접 push 하는
  // 양방향 stream. broker 의 PRICE exchange fan-out 을 우회 — broker 가 매매
  // transaction 에만 집중하도록 시세 부하를 분리한다.
  //
  // 흐름:
  //   forwarder (gRPC client) ─→ stream Tick ─→ mci-price (gRPC server)
  //                                                │
  //                                                └─→ BestConsumer / Aggregator / PricingConsumer
  //
  // ack: 주기적 (batch) 으로 server 가 publisher 에 ack 회신 — backpressure / 통계용.
  rpc PublishTick(stream Tick) returns (stream PublishAck);

  // SubscribeAlgo — 시스템 트레이딩 (내부 algo 봇) 전용 시세 stream.
  //
  // 일반 시세 (SubscribeQuote / Subscribe) 와 격리된 채널. 특징:
  //   - drop 최소화 — per-client buffer + timeout (Phase C).
  //   - 순서 보장 — 심볼별 monotonic seq. gap 없음.
  //   - backfill — from_seq > 0 이면 심볼별 ring buffer 에서 재생 후 live
  //     이어감 (Phase B). Phase A 는 from_seq=0 (지금부터) 만.
  //   - latency — is_backfill=true tick 은 replay, false 는 live.
  //   - profile 무관 — raw BEST bid/ask 만. margin 은 algo 가 자체 로직으로.
  //
  // Phase A 는 minimal skeleton — from_seq=0 만, ring buffer 는 신설되지만
  // backfill 로직은 Phase B, per-client buffered isolation 은 Phase C.
  rpc SubscribeAlgo(AlgoSubscribeRequest) returns (stream AlgoQuote);
}

// TickIngestService — quote-forwarder 가 host (시세 gRPC-only HA fan-in).
// broker FANOUT 대체: mci-price 가 SubscribeTicks 로 dial-in 해서 raw tick stream 을
// 구독한다. forwarder 는 dial-in 한 구독자 전체에 fan-out (slow consumer 자동 격리).
//
// 방향이 PublishTick 과 반대:
//   mci-price (client) ─SubscribeTicks─▶ forwarder (server) ─stream Tick─▶ mci-price
//
// 다중 mci-price 가 각자 dial → 각자 full 스트림 → 결정적 BEST (Active-Active).
// forwarder 재시작 시 mci-price 가 자동 재 dial (self-heal). 상세 docs/price-ha-grpc.md.
service TickIngestService {
  rpc SubscribeTicks(SubscribeTicksRequest) returns (stream Tick);
}

// SubscribeTicksRequest — mci-price 구독 요청.
message SubscribeTicksRequest {
  string subscriber_id = 1;  // mci-price 인스턴스 식별 (진단/로그)
}

// AlgoSubscribeRequest — 시스템 트레이딩 client 의 구독 요청.
message AlgoSubscribeRequest {
  // 구독 clientid — 다중 인스턴스 구분 + admin 진단 (예: "hedge-bot-01").
  string client_id = 1;

  // 구독 심볼 리스트 (예: ["USDKRW","EURUSD"]). 빈 리스트=모든 심볼.
  repeated string symbols = 2;

  // Phase B — 이전 disconnect 후 재접속 시 seq gap fill. 0 이면 지금부터.
  // > 0 이면 서버 ring buffer 에서 그 seq 다음부터 replay 후 live 이어감.
  // ring 에서 밀려나간 seq 는 sequence_gap 에러 로 응답 (client 는 snapshot 로
  // fallback).
  int64 from_seq = 3;

  // sources — 원천별 구독 필터 (예: ["SMB","KMB"]). mds excode 대응.
  //   - 비어있음(기본) : BEST 모드 — 다중시장 합성 best(+cross)만 수신 (기존 동작).
  //   - 지정          : per-source 모드 — 지정 원천의 raw 호가를 원천별로 수신
  //     (automkm 처럼 카운터파티별 마켓메이킹용). AlgoQuote.source 로 구분.
  repeated string sources = 4;

  // tenors — forward 만기 필터 (예: ["M01","M03"]). mds mdquot[tenor] 대응.
  //   - 비어있음(기본) : spot("SPT") 만 — swap 미적용 (기존 동작).
  //   - 지정          : 지정 tenor 의 effective-swap 적용 forward 호가 수신.
  //     AlgoQuote.tenor 로 구분. (spot 도 함께 원하면 "SPT" 포함)
  repeated string tenors = 5;
}

// AlgoQuote — algo stream 의 1건. seq 는 심볼별 monotonic.
message AlgoQuote {
  // 심볼 (예: "USDKRW"). SymbolMap 의 external name.
  string sym = 1;

  // Best bid/ask (마진 미적용). BestConsumer 결과 그대로.
  double bid = 2;
  double ask = 3;

  // seq — 심볼별 monotonic 증가. gap 감지 + backfill resume 기준.
  int64 seq = 4;

  // ts_source_unix_ns — 시세 발행 시각 (feed cooker 의 TS). latency 분해용.
  int64 ts_source_unix_ns = 5;

  // ts_wtg_unix_ns — WTG (mci-price BestConsumer) 처리 시각.
  // latency = client_recv_ts - ts_wtg_unix_ns 로 fan-out 지연 측정.
  int64 ts_wtg_unix_ns = 6;

  // is_backfill — replay 중이면 true. live 이후는 false. Phase A 는 항상 false.
  bool is_backfill = 7;

  // last — 최근 시장 체결가 (FIX MDEntryType=2 → mds fillprc 대응). 체결이 아직
  // 없으면 0. BestConsumer 가 per-symbol persist 한 최근값. refprctype=1(체결가
  // 기준) algo 가 사용.
  double last = 8;

  // last_qty — 체결 수량 (FIX 271). USD/KRW·CNH/KRW 는 항상 0.
  double last_qty = 9;

  // mid — 중간가 = (bid+ask)/2 (mds mdquot_calc_mid 대응, refprctype=2 algo 용).
  // 반올림 없음. bid·ask 둘 다 있을 때만 emit 되므로 항상 유효.
  double mid = 10;

  // source — 시세 원천. "BEST"(다중시장 합성) / "CROSS"(재정환율) 또는 원천별
  // 구독 시 "SMB"/"KMB" 등 카운터파티. mds excode 대응 — automkm 의 원천별
  // 마켓메이킹(state 가 (원천,symbol) 키잉)에 필요.
  string source = 11;

  // tenor — 만기. "SPT"=spot(swap 미적용), "M01"/"M03"… =forward(effective swap
  // 적용된 값). mds fold 의 mdquot[tenor] 대응 — bid/ask 는 해당 tenor 의
  // swap-applied 값. spot 구독(tenors 미지정)이면 "SPT".
  string tenor = 12;
}

// PublishAck — PublishTick stream 의 주기 응답. server 가 받은 tick 수와
// 마지막 처리 시각을 알려 publisher 가 backpressure / 끊김 진단에 활용.
message PublishAck {
  // 본 stream 에서 server 가 누적 처리한 tick 수.
  uint64 accepted = 1;
  // 본 stream 에서 server 가 drop 한 tick 수 (backpressure / 검증 실패 등).
  uint64 dropped = 2;
  // 마지막 ack 시점의 server unix nano.
  int64 server_unix_nano = 3;
}

// SubscribeRequest 는 edge 가 보내는 구독 옵션 (1차는 빈 메시지).
message SubscribeRequest {
  // 구독 대상 통화쌍 화이트리스트. 비어있으면 모든 심볼 수신.
  repeated string symbols = 1;

  // 구독자 식별 (edge instance 이름 등 — 디버깅/감사용).
  string subscriber_id = 2;
}

// Tick 은 정규화된 시세 단위.
//
// internal/price/decoder.go 의 Tick 구조와 1:1 대응. wire 호환성은
// proto 가 단일 출처이며 Go 측 struct 는 변환 코드로 매핑.
message Tick {
  uint64 market_id = 1;
  string symbol = 2;
  uint32 seq_num = 3;
  uint32 mask = 4;
  uint32 type = 5;     // pushmsg.type (uint8 → uint32 wrap)
  uint32 flag = 6;     // pushmsg.flag (uint8 → uint32 wrap)

  // body 는 cooker 의 시세 페이로드 raw bytes.
  // edge 는 그대로 ws 클라이언트로 forward — 해석하지 않음 (passthrough 원칙).
  bytes body = 7;

  // mci-price 가 디코딩한 wallclock (Unix nano). 디버깅/지연 측정용.
  int64 received_unix_nano = 8;
}

// QuoteSubscribeRequest 는 edge 가 CustomerQuote stream 을 구독할 때 보내는 옵션.
message QuoteSubscribeRequest {
  // edge instance 식별 (디버깅/감사용).
  string subscriber_id = 1;

  // 수신할 Profile 화이트리스트 (예: "WEB.BRANCH.VIP").
  // 비어있으면 모든 Profile 수신 — edge 가 사용자별 분기 책임.
  repeated string profile_keys = 2;

  // 수신할 통화쌍 화이트리스트. 비어있으면 모든 pair.
  repeated string pairs = 3;
}

// BarSubscribeRequest 는 mci-chart 가 봉 stream 을 구독할 때 보내는 옵션.
message BarSubscribeRequest {
  string subscriber_id = 1;

  // 수신할 timeframe 화이트리스트 (예: "1m", "5m"). 비면 모두.
  repeated string timeframes = 2;
  // 수신할 통화쌍 화이트리스트. 비면 모두.
  repeated string pairs = 3;
}

// Bar 는 closed 된 OHLC 봉. quote.Bar 와 1:1 대응.
message Bar {
  string pair       = 1;
  string tf         = 2;   // "1m" / "5m" / ...
  int64  opened_unix_nano = 3;
  int64  closed_unix_nano = 4;

  double open_bid  = 5;
  double open_ask  = 6;
  double high_bid  = 7;
  double high_ask  = 8;
  double low_bid   = 9;
  double low_ask   = 10;
  double close_bid = 11;
  double close_ask = 12;

  int32 tick_count = 13;
}

// CustomerQuote 는 마진 적용된 고객 노출 시세.
// pkg/pricing.CustomerQuote 와 1:1 대응. profile 정보는 edge fan-out 분기에 사용.
message CustomerQuote {
  string pair    = 1;
  string channel = 2;  // session.Channel ("WEB"/"MOB"/"CS"/"FIX"/"ADM")
  string site    = 3;  // session.Site ("BRANCH"/"HQ")
  string tier    = 4;  // session.Tier ("VIP"/"GOLD"/"STD"...)
  string tenor   = 5;  // "SPOT" / "1W" / "1M" ...

  double bid = 6;
  double ask = 7;

  // 시세 wallclock (Unix nano). raw 시점 timestamp 유지.
  int64 ts_unix_nano = 8;

  // 감사·재현용 — 산출 근거가 된 raw 값과 적용된 PricingTable.Version.
  double raw_bid       = 9;
  double raw_ask       = 10;
  int64  table_version = 11;

  // QuoteID — FIX 4.4 tag 117 호환 식별자. mci-price 발행, 매칭 엔진이
  // pkg/quoteid.Registry 로 검증 시 사용한다. 빈값이면 quoteid 비활성.
  string quote_id = 12;

  // ValidUntil — 토큰 만료 wallclock (Unix nano). 이 시점 이후 엔진은
  // 토큰을 거절해야 한다 (FX Global Code Principle 17 — last-look 한계).
  int64  valid_until_unix_nano = 13;

  // Phase 4b — customer-specific 마진이 적용된 quote 인 경우의 customer 식별자.
  // 빈 값이면 Profile-only quote (SubscribeQuote 경로). 채워지면
  // SubscribeCustomerQuote 경로에서 customer 별 fan-out.
  string customer_id = 14;
}

// CustomerRegistration — RegisterCustomer stream 의 단위 메시지. edge 가 ws
// 클라이언트의 customer 연결/종료마다 1 건씩 send.
message CustomerRegistration {
  enum Op {
    OP_UNSPECIFIED = 0;
    OP_REGISTER    = 1;
    OP_UNREGISTER  = 2;
  }
  Op op = 1;

  // 등록/해제 대상 customer 식별자. ws 클라이언트의 user-id 또는 별도 customer-id.
  string customer_id = 2;

  // Profile key (REGISTER 시 필수). 예: "WEB.BRANCH.VIP".
  // mci-price 가 이 값을 session.Profile 로 역파싱해 CustomerRegistry 에 저장.
  string profile_key = 3;
}

// CustomerAck — RegisterCustomer 의 server → client 응답.
message CustomerAck {
  string customer_id = 1;
  bool   ok          = 2;
  // ok=false 일 때 사유 (예: "invalid profile key", "duplicate registration").
  string error       = 3;
}

// CustomerQuoteSubscribeRequest — SubscribeCustomerQuote 옵션.
message CustomerQuoteSubscribeRequest {
  // edge instance 식별. RegisterCustomer 의 subscriber_id 와 같은 값을 쓰면
  // 본 stream 으로 등록한 customer 들의 quote 만 받는다 (자동 매칭).
  string subscriber_id = 1;

  // 명시적 customer 필터. 비어있으면 본 subscriber_id 로 등록한 customer 들.
  repeated string customer_ids = 2;
}
