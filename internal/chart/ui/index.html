<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WTG Chart · FX</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg-base: #070a13; --bg-card: #101727; --bg-elev: #172033;
    --border: #1f2a40; --text: #e2e8f0; --text-muted: #94a3b8;
    --accent: #22d3ee; --good: #10b981; --bad: #ef4444;
  }
  html, body { background: var(--bg-base); color: var(--text); }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .chip {
    padding: .25rem .6rem; border-radius: .5rem;
    background: var(--bg-elev); border: 1px solid var(--border);
    font-size: .75rem; cursor: pointer; transition: all .15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip[data-active="true"] {
    background: rgba(34,211,238,0.1); border-color: var(--accent); color: var(--accent);
  }
  .panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 1rem;
  }
  select, input {
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--text); padding: .5rem .75rem; border-radius: .5rem;
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: .85rem;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body class="min-h-screen">

<!-- alert 배너 stack (Notification 권한 없을 때의 in-page fallback) -->
<div id="alert-banners" class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-sm"></div>

<!-- Alert 추가 모달 -->
<div id="alert-modal" class="fixed inset-0 bg-ink-950/80 z-40 hidden items-center justify-center p-4" style="backdrop-filter: blur(4px);">
  <div class="panel max-w-md w-full p-5 space-y-3">
    <div class="flex items-center justify-between">
      <h4 class="text-base font-semibold">신규 알림</h4>
      <button onclick="closeAlertModal()" class="text-slate-400 hover:text-slate-200">✕</button>
    </div>
    <div class="space-y-2 text-sm">
      <div>
        <label class="text-xs text-slate-400">통화쌍</label>
        <div class="font-mono text-accent" id="am-pair-preview">—</div>
      </div>
      <div>
        <label class="text-xs text-slate-400">조건</label>
        <select id="am-type">
          <optgroup label="── 임계값 (값 필요) ──">
            <option value="price_above">가격 ↑ (이상 돌파 시)</option>
            <option value="price_below">가격 ↓ (이하 이탈 시)</option>
            <option value="rsi_above">RSI ↑ (일반적으로 70 — 과매수)</option>
            <option value="rsi_below">RSI ↓ (일반적으로 30 — 과매도)</option>
          </optgroup>
          <optgroup label="── 이동평균 crossover (값 불필요) ──">
            <option value="price_cross_sma20_up">가격 > SMA(20) 상향돌파</option>
            <option value="price_cross_sma20_down">가격 < SMA(20) 하향이탈</option>
            <option value="price_cross_sma50_up">가격 > SMA(50) 상향돌파</option>
            <option value="price_cross_sma50_down">가격 < SMA(50) 하향이탈</option>
            <option value="sma_golden_cross_20_50">SMA(20) > SMA(50) Golden Cross</option>
            <option value="sma_death_cross_20_50">SMA(20) < SMA(50) Death Cross</option>
          </optgroup>
          <optgroup label="── MACD crossover (값 불필요) ──">
            <option value="macd_cross_signal_up">MACD > Signal 상향돌파 (강세)</option>
            <option value="macd_cross_signal_down">MACD < Signal 하향이탈 (약세)</option>
            <option value="macd_cross_zero_up">MACD > 0 상향돌파 (모멘텀 +)</option>
            <option value="macd_cross_zero_down">MACD < 0 하향이탈 (모멘텀 −)</option>
          </optgroup>
        </select>
      </div>
      <div id="am-value-row">
        <label class="text-xs text-slate-400">임계값</label>
        <input id="am-value" type="number" step="any" placeholder="예: 1400.00 (가격) / 70 (RSI)" class="w-full" />
      </div>
      <div class="text-[11px] text-slate-500">
        한 번 trigger 되면 자동 비활성화 됩니다 (one-shot). 다시 활성화하려면 알림을 삭제하고 새로 등록하세요.
      </div>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <button onclick="closeAlertModal()" class="chip">취소</button>
      <button id="am-save" class="chip" style="background: linear-gradient(to right, #06b6d4, #6366f1); color: #070a13; font-weight: 600;">저장</button>
    </div>
  </div>
</div>

<div class="max-w-[1400px] mx-auto p-4 space-y-4">

  <!-- 헤더 -->
  <header class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold">WTG Chart</h1>
      <p class="text-xs text-slate-400">FX OHLC — TimescaleDB historical + WS live</p>
    </div>
    <div class="flex items-center gap-2 text-xs">
      <span class="text-slate-500 uppercase tracking-widest text-[10px]">WS</span>
      <span id="ws-state" class="font-mono text-slate-400">●</span>
    </div>
  </header>

  <!-- 컨트롤 패널 -->
  <div class="panel p-4 space-y-3">
    <div class="flex flex-wrap items-center gap-3">
      <div class="flex items-center gap-2">
        <label class="text-xs text-slate-400 uppercase tracking-widest">통화쌍</label>
        <select id="sel-pair">
          <option value="USD/KRW">USD/KRW</option>
          <option value="EUR/KRW">EUR/KRW</option>
          <option value="JPY/KRW">JPY/KRW</option>
          <option value="GBP/KRW">GBP/KRW</option>
          <option value="AUD/KRW">AUD/KRW</option>
          <option value="CNY/KRW">CNY/KRW</option>
          <option value="EUR/USD">EUR/USD</option>
          <option value="USD/JPY">USD/JPY</option>
          <option value="GBP/USD">GBP/USD</option>
          <option value="AUD/USD">AUD/USD</option>
        </select>
      </div>

      <div class="flex items-center gap-1">
        <label class="text-xs text-slate-400 uppercase tracking-widest mr-1">TF</label>
        <button class="chip tf-btn" data-tf="1m" data-active="true">1m</button>
        <button class="chip tf-btn" data-tf="5m">5m</button>
        <button class="chip tf-btn" data-tf="15m">15m</button>
        <button class="chip tf-btn" data-tf="1h">1h</button>
        <button class="chip tf-btn" data-tf="1d">1d</button>
      </div>

      <div class="flex items-center gap-1">
        <label class="text-xs text-slate-400 uppercase tracking-widest mr-1">기간</label>
        <button class="chip range-btn" data-range="1h">1H</button>
        <button class="chip range-btn" data-range="4h" data-active="true">4H</button>
        <button class="chip range-btn" data-range="1d">1D</button>
        <button class="chip range-btn" data-range="1w">1W</button>
        <button class="chip range-btn" data-range="1mo">1M</button>
      </div>

      <div class="ml-auto flex items-center gap-2">
        <button id="reload" class="chip">↻ 새로고침</button>
        <button id="autoscroll" class="chip" data-active="true">▶ 자동 스크롤</button>
      </div>
    </div>

    <!-- Indicator 토글 행 -->
    <div class="flex flex-wrap items-center gap-2 pt-1 border-t border-ink-700/40" style="border-top-color: var(--border);">
      <label class="text-xs text-slate-400 uppercase tracking-widest mr-1">Indicators</label>
      <button class="chip ind-btn" data-ind="sma20">SMA 20</button>
      <button class="chip ind-btn" data-ind="sma50">SMA 50</button>
      <button class="chip ind-btn" data-ind="ema9">EMA 9</button>
      <button class="chip ind-btn" data-ind="bb20">BB(20,2)</button>
      <button class="chip ind-btn" data-ind="rsi14">RSI 14</button>
      <button class="chip ind-btn" data-ind="macd">MACD(12,26,9)</button>
      <button class="chip ind-btn" data-ind="stoch">Stoch(14,3)</button>
      <button class="chip ind-btn" data-ind="vol">Volume</button>
    </div>

    <!-- Alerts (가격/RSI 임계값) -->
    <div class="flex flex-wrap items-center gap-2 pt-1" style="border-top: 1px solid var(--border);">
      <label class="text-xs text-slate-400 uppercase tracking-widest mr-1">Alerts</label>
      <span class="text-xs text-slate-500">활성 <span id="alert-count" class="font-mono text-slate-200">0</span></span>
      <button id="alert-add" class="chip">+ 신규</button>
      <button id="alert-toggle-list" class="chip">목록</button>
      <button id="alert-permission" class="chip" title="브라우저 알림 권한 요청">🔔 권한</button>
      <span id="alert-perm-state" class="text-[10px] text-slate-500 ml-1">—</span>
    </div>
    <div id="alert-list" class="hidden mt-2 space-y-1 text-xs"></div>

    <!-- 라이브 시세 헤더 (최근 봉의 OHLC 표시) -->
    <div class="flex flex-wrap items-center gap-4 text-xs font-mono">
      <span class="text-slate-500 uppercase tracking-widest text-[10px]">최근 봉</span>
      <span>O <span id="cur-open" class="text-slate-200">—</span></span>
      <span>H <span id="cur-high" class="text-good">—</span></span>
      <span>L <span id="cur-low" class="text-bad">—</span></span>
      <span>C <span id="cur-close" class="text-accent">—</span></span>
      <span class="text-slate-500">|</span>
      <span>틱 <span id="cur-ticks" class="text-slate-200">—</span></span>
      <span class="text-slate-500">|</span>
      <span>봉 <span id="bar-count" class="text-slate-200">0</span></span>
      <span class="text-slate-500">|</span>
      <span>마지막 갱신 <span id="last-update" class="text-slate-400">—</span></span>
    </div>
  </div>

  <!-- 차트 (multi-pane: 메인 + indicator pane 들) -->
  <div class="panel p-2">
    <div id="charts">
      <div id="chart-main" style="height: 60vh;"></div>
      <!-- indicator pane 들이 여기 동적으로 append 됨. timeScale 동기화. -->
    </div>
  </div>

  <!-- 상태 표시 -->
  <div id="status" class="text-xs text-slate-500 font-mono"></div>

</div>

<script>
// ───────── helpers ─────────
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

// localStorage 설정 저장 / 복원.
// 단일 JSON blob 으로 일관성 유지 — partial corruption 방지.
const LS_SETTINGS = "wtg_chart_settings_v1";

function loadSavedSettings() {
  try {
    const raw = localStorage.getItem(LS_SETTINGS);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (_) {
    return null; // 손상된 JSON 은 그냥 무시 (default 로 시작).
  }
}

function saveSettings() {
  try {
    const s = {
      pair: currentPair,
      tf: currentTF,
      range: currentRange,
      autoScroll: autoScroll,
      indicators: Array.from(indActive),
    };
    localStorage.setItem(LS_SETTINGS, JSON.stringify(s));
  } catch (_) {
    // private mode / quota — silent.
  }
}

// DOM 빌드 헬퍼 — innerHTML 회피 (XSS 안전).
function el(tag, opts, ...children) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.class) e.className = opts.class;
    if (opts.text != null) e.textContent = opts.text;
    if (opts.style) Object.assign(e.style, opts.style);
    if (opts.onclick) e.onclick = opts.onclick;
    if (opts.title) e.title = opts.title;
  }
  for (const c of children) if (c != null) e.appendChild(c);
  return e;
}

// ───────── Alerts (가격 / RSI 임계값) ─────────
//
// 모델: 각 alert 는 {id, type, pair, value, enabled, lastVal} 로 보관.
// 평가: 봉 close 시점에 currentPair 매칭하는 alert 의 type 별 현재값을 계산해
//      prev → curr 의 임계값 crossing 여부 확인. 한 번 trigger 시 자동 disable
//      (one-shot) — 같은 알림이 매 봉 반복 발사되는 것을 방지.
// 알림: Notification API granted → 브라우저 알림, 아니면 인-페이지 배너.
// 영속: localStorage 별도 key (LS_ALERTS).

const LS_ALERTS = "wtg_chart_alerts_v1";
let alerts = [];

function loadAlerts() {
  try {
    const raw = localStorage.getItem(LS_ALERTS);
    if (!raw) return;
    const arr = JSON.parse(raw);
    if (Array.isArray(arr)) alerts = arr;
  } catch (_) {}
}

function saveAlerts() {
  try { localStorage.setItem(LS_ALERTS, JSON.stringify(alerts)); } catch (_) {}
}

function nextAlertId() {
  return "a_" + Math.random().toString(36).slice(2, 9) + "_" + Date.now().toString(36);
}

function addAlert(type, value) {
  const a = {
    id: nextAlertId(),
    type: type,
    pair: currentPair,
    value: alertTypeNeedsValue(type) ? Number(value) : 0,
    enabled: true,
    lastVal: null,  // 임계값 type 용
    lastDiff: null, // crossover type 용 (signed diff)
  };
  alerts.push(a);
  saveAlerts();
  renderAlertList();
}

function removeAlert(id) {
  alerts = alerts.filter(a => a.id !== id);
  saveAlerts();
  renderAlertList();
}

function toggleAlertEnabled(id) {
  const a = alerts.find(x => x.id === id);
  if (!a) return;
  a.enabled = !a.enabled;
  if (a.enabled) a.lastVal = null; // 재활성 시 첫 평가 skip 위해 reset.
  saveAlerts();
  renderAlertList();
}

const ALERT_TYPE_LABEL = {
  price_above: "가격 ↑",
  price_below: "가격 ↓",
  rsi_above:   "RSI ↑",
  rsi_below:   "RSI ↓",
  price_cross_sma20_up:   "가격 > SMA20",
  price_cross_sma20_down: "가격 < SMA20",
  price_cross_sma50_up:   "가격 > SMA50",
  price_cross_sma50_down: "가격 < SMA50",
  sma_golden_cross_20_50: "SMA20 > SMA50 (Golden)",
  sma_death_cross_20_50:  "SMA20 < SMA50 (Death)",
  macd_cross_signal_up:   "MACD > Signal",
  macd_cross_signal_down: "MACD < Signal",
  macd_cross_zero_up:     "MACD > 0",
  macd_cross_zero_down:   "MACD < 0",
};

// 임계값 (value) 입력이 필요한 type 인지.
function alertTypeNeedsValue(t) {
  return t === "price_above" || t === "price_below" ||
         t === "rsi_above"   || t === "rsi_below";
}

function renderAlertList() {
  const list = $("#alert-list");
  list.replaceChildren();
  const activeCount = alerts.filter(a => a.enabled).length;
  $("#alert-count").textContent = activeCount;
  if (alerts.length === 0) {
    list.appendChild(el("div", { class: "text-slate-500", text: "등록된 알림이 없습니다." }));
    return;
  }
  for (const a of alerts) {
    const row = el("div", {
      class: "flex items-center gap-2 py-1 px-2 rounded",
      style: { background: a.enabled ? "rgba(34,211,238,0.06)" : "rgba(100,116,139,0.08)" },
    });
    // label — pair · type [· value (threshold type 만)]
    const needsValue = alertTypeNeedsValue(a.type);
    const label = el("div", {
      class: "flex-1 font-mono",
      style: a.enabled ? {} : { opacity: "0.5" },
    },
      el("span", { class: "text-slate-300", text: a.pair }),
      document.createTextNode(" · "),
      el("span", { class: "text-accent", text: ALERT_TYPE_LABEL[a.type] || a.type }),
    );
    if (needsValue) {
      label.appendChild(document.createTextNode(" · "));
      label.appendChild(el("span", { class: "text-slate-200", text: String(a.value) }));
    }
    row.appendChild(label);

    row.appendChild(el("button", {
      class: "chip",
      text: a.enabled ? "● ON" : "○ OFF",
      onclick: () => toggleAlertEnabled(a.id),
    }));
    row.appendChild(el("button", {
      class: "chip",
      text: "✕",
      onclick: () => { if (confirm("이 알림을 삭제할까요?")) removeAlert(a.id); },
    }));
    list.appendChild(row);
  }
}

// 새 봉 또는 봉 갱신 후 호출 — crossing 평가.
//
// 두 가지 분류:
//   1) 임계값 (price_above/below, rsi_above/below):
//      a.lastVal vs curr 비교. value 와의 단방향 crossing.
//   2) crossover (price vs SMA, SMA vs SMA):
//      a.lastDiff (signed) vs currDiff 부호 전환으로 crossing 검출.
function evaluateAlerts(candle) {
  if (alerts.length === 0) return;
  const active = alerts.filter(a => a.enabled && a.pair === currentPair);
  if (active.length === 0) return;

  // 필요한 값만 lazy compute.
  const needRSI   = active.some(a => a.type.startsWith("rsi_"));
  const needSMA20 = active.some(a => a.type.includes("sma20") || a.type.includes("_20_"));
  const needSMA50 = active.some(a => a.type.includes("sma50") || a.type.includes("_50_"));
  const needMACD  = active.some(a => a.type.startsWith("macd_"));

  let rsi = null, sma20 = null, sma50 = null;
  let macdLast = null, signalLast = null;
  if (needRSI) {
    const r = calcRSI(candleData, 14);
    if (r.length > 0) rsi = r[r.length - 1].value;
  }
  if (needSMA20) {
    const s = calcSMA(candleData, 20);
    if (s.length > 0) sma20 = s[s.length - 1].value;
  }
  if (needSMA50) {
    const s = calcSMA(candleData, 50);
    if (s.length > 0) sma50 = s[s.length - 1].value;
  }
  if (needMACD) {
    const m = calcMACD(candleData, 12, 26, 9);
    if (m.macd.length > 0)   macdLast   = m.macd[m.macd.length - 1].value;
    if (m.signal.length > 0) signalLast = m.signal[m.signal.length - 1].value;
  }
  const close = candle.close;

  for (const a of alerts) {
    if (!a.enabled || a.pair !== currentPair) continue;

    let crossed = false;
    let triggerVal = null;

    switch (a.type) {
      case "price_above": case "price_below":
      case "rsi_above":   case "rsi_below": {
        let curr = null;
        if (a.type === "price_above" || a.type === "price_below") curr = close;
        else curr = rsi;
        if (curr == null) break;
        const prev = a.lastVal;
        a.lastVal = curr;
        if (prev == null) break;
        if (a.type === "price_above" || a.type === "rsi_above") {
          crossed = prev <= a.value && curr > a.value;
        } else {
          crossed = prev >= a.value && curr < a.value;
        }
        triggerVal = curr;
        break;
      }
      case "price_cross_sma20_up":   case "price_cross_sma20_down":
      case "price_cross_sma50_up":   case "price_cross_sma50_down": {
        const smaVal = a.type.includes("sma20") ? sma20 : sma50;
        if (smaVal == null) break;
        const currDiff = close - smaVal;
        const prevDiff = a.lastDiff;
        a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type.endsWith("_up")) {
          crossed = prevDiff <= 0 && currDiff > 0;
        } else {
          crossed = prevDiff >= 0 && currDiff < 0;
        }
        triggerVal = close;
        break;
      }
      case "sma_golden_cross_20_50": case "sma_death_cross_20_50": {
        if (sma20 == null || sma50 == null) break;
        const currDiff = sma20 - sma50;
        const prevDiff = a.lastDiff;
        a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type === "sma_golden_cross_20_50") {
          crossed = prevDiff <= 0 && currDiff > 0;
        } else {
          crossed = prevDiff >= 0 && currDiff < 0;
        }
        triggerVal = sma20;
        break;
      }
      case "macd_cross_signal_up": case "macd_cross_signal_down": {
        if (macdLast == null || signalLast == null) break;
        const currDiff = macdLast - signalLast;
        const prevDiff = a.lastDiff;
        a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type === "macd_cross_signal_up") {
          crossed = prevDiff <= 0 && currDiff > 0;
        } else {
          crossed = prevDiff >= 0 && currDiff < 0;
        }
        triggerVal = macdLast;
        break;
      }
      case "macd_cross_zero_up": case "macd_cross_zero_down": {
        if (macdLast == null) break;
        // zero baseline — diff 가 곧 MACD 값 자체.
        const currDiff = macdLast;
        const prevDiff = a.lastDiff;
        a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type === "macd_cross_zero_up") {
          crossed = prevDiff <= 0 && currDiff > 0;
        } else {
          crossed = prevDiff >= 0 && currDiff < 0;
        }
        triggerVal = macdLast;
        break;
      }
    }

    if (crossed) {
      fireAlert(a, triggerVal == null ? 0 : triggerVal);
      a.enabled = false;
      saveAlerts();
      renderAlertList();
    }

}

function fireAlert(a, val) {

    try { new Notification("WTG Chart", { body: msg }); } catch (_) {}

}

// ───────── multi-pane 차트 초기화 ─────────
// 메인 chart 는 캔들 + overlay (SMA/EMA/BB) 만. RSI/MACD/Stoch/Volume 은 각각
// 별도 LightweightCharts 인스턴스로 stacked 하고 timeScale 을 양방향 동기화.

const commonOpts = () => ({
  layout: {
    background: { type: "solid", color: getComputedStyle(document.documentElement).getPropertyValue("--bg-card") || "#101727" },
    textColor: "#cbd5e1",
    fontFamily: "JetBrains Mono, ui-monospace, monospace",
  },
  grid: {
    vertLines: { color: "rgba(255,255,255,0.05)" },
    horzLines: { color: "rgba(255,255,255,0.05)" },
  },
  rightPriceScale: { borderColor: "#1f2a40" },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
});

const mainChart = LightweightCharts.createChart($("#chart-main"), {
  ...commonOpts(),
  timeScale: { borderColor: "#1f2a40", timeVisible: true, secondsVisible: false },
});
const candleSeries = mainChart.addCandlestickSeries({
  upColor: "#10b981", downColor: "#ef4444",
  borderUpColor: "#10b981", borderDownColor: "#ef4444",
  wickUpColor: "#10b981", wickDownColor: "#ef4444",
});

// panes: id → { chart, el, primary }. primary 는 crosshair sync 용 대표 series.
const panes = {};
// 메인 차트의 primary series — crosshair sync 의 setCrosshairPosition 인자로 사용.
let mainPrimary = candleSeries;
// 동기화 무한루프 방지 가드 — timeScale, crosshair 각각.
let syncingRange = false;
let syncingCrosshair = false;

function attachSync(chart) {
  chart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
    if (syncingRange || !range) return;
    syncingRange = true;
    if (mainChart !== chart) {
      mainChart.timeScale().setVisibleLogicalRange(range);
    }
    for (const id in panes) {
      if (panes[id].chart !== chart) {
        panes[id].chart.timeScale().setVisibleLogicalRange(range);
      }
    }
    syncingRange = false;
  });
}
attachSync(mainChart);

// 모든 chart 인스턴스 enumerate — crosshair sync 에서 사용.
function allCharts() {
  const out = [{ chart: mainChart, primary: mainPrimary }];
  for (const id in panes) {
    out.push({ chart: panes[id].chart, primary: panes[id].primary });
  }
  return out;
}

// crosshair 동기화 — 한 차트에서 마우스 이동 / 떠남 이벤트를 다른 차트로 전파.
//
// lightweight-charts v4 의 setCrosshairPosition(price, time, series) 는 (vertical line
// at time) + (horizontal line at price) 를 그린다. 우리는 시간축만 sync 하면 충분
// 하지만 API 는 price 도 받으므로 series 의 해당 time 값을 lookup 해서 채운다.
//
// 무한루프 가드: 한 차트의 setCrosshairPosition 호출이 다른 차트의 crosshair move
// 이벤트를 다시 트리거하지 않도록 syncingCrosshair flag 사용.
function attachCrosshairSync(chart) {
  chart.subscribeCrosshairMove((param) => {
    if (syncingCrosshair) return;
    syncingCrosshair = true;
    try {
      if (!param || !param.time) {
        // 커서가 차트 밖으로 — 다른 차트의 crosshair 도 모두 clear.
        for (const c of allCharts()) {
          if (c.chart !== chart) c.chart.clearCrosshairPosition();
        }
        return;
      }
      // param.time 을 다른 차트에 propagate.
      for (const c of allCharts()) {
        if (c.chart === chart) continue;
        if (!c.primary) continue;
        // price 는 해당 series 의 param.time 값을 사용 — 없으면 0.
        let price = 0;
        const data = param.seriesData ? param.seriesData.get(c.primary) : null;
        if (data && typeof data.value === "number") {
          price = data.value;
        } else if (data && typeof data.close === "number") {
          price = data.close;
        }
        c.chart.setCrosshairPosition(price, param.time, c.primary);
      }
    } finally {
      syncingCrosshair = false;
    }
  });
}
attachCrosshairSync(mainChart);

function ensurePane(id) {
  if (panes[id]) return panes[id];
  const el = document.createElement("div");
  el.id = "chart-" + id;
  el.style.height = "140px";
  el.style.marginTop = "6px";
  el.style.borderTop = "1px solid var(--border)";
  $("#charts").appendChild(el);
  const c = LightweightCharts.createChart(el, {
    ...commonOpts(),
    // 시간축은 메인만 표시 — pane 들은 visible:false 로 공간 절약.
    timeScale: { borderColor: "#1f2a40", visible: false },
    handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: false },
    handleScale:  { mouseWheel: true, pinch: true, axisPressedMouseMove: true, axisDoubleClickReset: true },
  });
  attachSync(c);
  attachCrosshairSync(c);
  // 윈도우 크기에 맞춤.
  c.applyOptions({ width: $("#chart-main").clientWidth });
  panes[id] = { chart: c, el, primary: null };
  return panes[id];
}

function removePane(id) {
  if (!panes[id]) return;
  panes[id].chart.remove();
  panes[id].el.remove();
  delete panes[id];
}

// resize — 모든 pane 의 width 를 메인 너비로 맞춤.
function resizeAllPanes() {
  const w = $("#chart-main").clientWidth;
  mainChart.applyOptions({ width: w });
  for (const id in panes) panes[id].chart.applyOptions({ width: w });
}
window.addEventListener("resize", resizeAllPanes);

// ───────── Indicator 관리 ─────────
// 마지막으로 로드된 candle 배열 (시간 ASC) — 라이브 업데이트 시 indicator 재계산용.
let candleData = [];
// id → series 매핑. 토글 OFF 시 series.removeSeries 로 정리.
const indSeries = {};
// 활성 indicator id 집합.
const indActive = new Set();

const IND_COLORS = {
  sma20: "#22d3ee",
  sma50: "#a78bfa",
  ema9:  "#f59e0b",
  bb20:  "#94a3b8",
  rsi14: "#22d3ee",
  vol:   "#64748b",
  macd_line:   "#22d3ee",
  macd_signal: "#f59e0b",
  stoch_k:     "#22d3ee",
  stoch_d:     "#f59e0b",
};

// SMA[i] = avg(close[i-N+1..i]). 앞쪽 N-1 개는 결과 없음.
function calcSMA(candles, n) {
  const out = [];
  let sum = 0;
  for (let i = 0; i < candles.length; i++) {
    sum += candles[i].close;
    if (i >= n) sum -= candles[i - n].close;
    if (i >= n - 1) {
      out.push({ time: candles[i].time, value: sum / n });
    }
  }
  return out;
}

// EMA — 첫 n개의 SMA 로 seed 한 뒤 EMA 수식 적용.
function calcEMA(candles, n) {
  if (candles.length < n) return [];
  const k = 2 / (n + 1);
  const out = [];
  let ema;
  // seed: 첫 n 개의 평균.
  let sum = 0;
  for (let i = 0; i < n; i++) sum += candles[i].close;
  ema = sum / n;
  out.push({ time: candles[n - 1].time, value: ema });
  for (let i = n; i < candles.length; i++) {
    ema = candles[i].close * k + ema * (1 - k);
    out.push({ time: candles[i].time, value: ema });
  }
  return out;
}

// Bollinger Bands — SMA(n) ± k·stdev.  반환: [{upper,lower,mid}, ...]
function calcBB(candles, n, kMul) {
  const out = [];
  if (candles.length < n) return out;
  for (let i = n - 1; i < candles.length; i++) {
    let sum = 0;
    for (let j = i - n + 1; j <= i; j++) sum += candles[j].close;
    const mid = sum / n;
    let varSum = 0;
    for (let j = i - n + 1; j <= i; j++) {
      const d = candles[j].close - mid;
      varSum += d * d;
    }
    const sd = Math.sqrt(varSum / n);
    out.push({ time: candles[i].time, mid, upper: mid + kMul * sd, lower: mid - kMul * sd });
  }
  return out;
}

// Wilder's RSI — gain/loss 의 Wilder smoothing.
function calcRSI(candles, n) {
  const out = [];
  if (candles.length <= n) return out;
  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= n; i++) {
    const ch = candles[i].close - candles[i - 1].close;
    if (ch >= 0) avgGain += ch; else avgLoss += -ch;
  }
  avgGain /= n; avgLoss /= n;
  // 첫 RSI 시점 = candle[n].
  let rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
  out.push({ time: candles[n].time, value: avgLoss === 0 ? 100 : 100 - 100 / (1 + rs) });
  for (let i = n + 1; i < candles.length; i++) {
    const ch = candles[i].close - candles[i - 1].close;
    const gain = ch > 0 ? ch : 0;
    const loss = ch < 0 ? -ch : 0;
    avgGain = (avgGain * (n - 1) + gain) / n;
    avgLoss = (avgLoss * (n - 1) + loss) / n;
    rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
    out.push({ time: candles[i].time, value: avgLoss === 0 ? 100 : 100 - 100 / (1 + rs) });
  }
  return out;
}

// MACD(fast, slow, signal) = (EMA_fast - EMA_slow), signal=EMA(MACD), hist=MACD-Signal.
// 표준 (12, 26, 9). 반환 모양은 lightweight-charts 의 setData 와 호환 가능한 3개 시리즈.
function calcMACD(candles, fast, slow, sig) {
  const out = { macd: [], signal: [], hist: [] };
  if (candles.length < slow + sig) return out;

  // EMA 배열 — candle index 기준 (앞부분 null) 로 정렬해서 시점 align.
  const emaArr = (n) => {
    const arr = new Array(candles.length).fill(null);
    if (candles.length < n) return arr;
    const k = 2 / (n + 1);
    let sum = 0;
    for (let i = 0; i < n; i++) sum += candles[i].close;
    let e = sum / n;
    arr[n - 1] = e;
    for (let i = n; i < candles.length; i++) {
      e = candles[i].close * k + e * (1 - k);
      arr[i] = e;
    }
    return arr;
  };

  const ef = emaArr(fast);
  const es = emaArr(slow);

  // MACD line = EMA_fast - EMA_slow (둘 다 정의된 index 부터).
  const macdVals = new Array(candles.length).fill(null);
  for (let i = slow - 1; i < candles.length; i++) {
    if (ef[i] != null && es[i] != null) {
      macdVals[i] = ef[i] - es[i];
      out.macd.push({ time: candles[i].time, value: macdVals[i] });
    }
  }

  // Signal = EMA(sig) of MACD line. 첫 sig 개 평균으로 seed.
  const firstMacdIdx = slow - 1;
  if (candles.length < firstMacdIdx + sig) return out;
  let sigSum = 0;
  for (let i = 0; i < sig; i++) sigSum += macdVals[firstMacdIdx + i];
  let signalEMA = sigSum / sig;
  const sigStart = firstMacdIdx + sig - 1;
  out.signal.push({ time: candles[sigStart].time, value: signalEMA });
  const k = 2 / (sig + 1);
  for (let i = sigStart + 1; i < candles.length; i++) {
    signalEMA = macdVals[i] * k + signalEMA * (1 - k);
    out.signal.push({ time: candles[i].time, value: signalEMA });
  }

  // Histogram = MACD - Signal (signal 정의된 시점부터).
  const sigMap = new Map(out.signal.map(s => [s.time, s.value]));
  for (const m of out.macd) {
    const sv = sigMap.get(m.time);
    if (sv == null) continue;
    const v = m.value - sv;
    out.hist.push({
      time: m.time,
      value: v,
      color: v >= 0 ? "rgba(16,185,129,0.5)" : "rgba(239,68,68,0.5)",
    });
  }
  return out;
}

// Fast Stochastic Oscillator — %K = 100·(close - lowest_low_N) / (highest_high_N - lowest_low_N),
// %D = SMA(%K, dPeriod). 표준 (14, 3). 0~100 oscillator.
//
// 봉 자체의 high/low 를 사용 — mid 캔들이므로 high_bid/ask 의 mid 임 (정확도 충분).
function calcStoch(candles, kPeriod, dPeriod) {
  const out = { k: [], d: [] };
  if (candles.length < kPeriod) return out;

  // %K 계산.
  for (let i = kPeriod - 1; i < candles.length; i++) {
    let hh = -Infinity, ll = Infinity;
    for (let j = i - kPeriod + 1; j <= i; j++) {
      if (candles[j].high > hh) hh = candles[j].high;
      if (candles[j].low < ll) ll = candles[j].low;
    }
    const range = hh - ll;
    const kVal = range === 0 ? 50 : 100 * (candles[i].close - ll) / range;
    out.k.push({ time: candles[i].time, value: kVal });
  }

  // %D = SMA(dPeriod) of %K.
  if (out.k.length < dPeriod) return out;
  for (let i = dPeriod - 1; i < out.k.length; i++) {
    let sum = 0;
    for (let j = i - dPeriod + 1; j <= i; j++) sum += out.k[j].value;
    out.d.push({ time: out.k[i].time, value: sum / dPeriod });
  }
  return out;
}

// Volume — tick_count 를 histogram.
function calcVolume(candles) {
  return candles.map(c => ({
    time: c.time,
    value: c._raw ? c._raw.tick_count : 0,
    color: c.close >= c.open ? "rgba(16,185,129,0.5)" : "rgba(239,68,68,0.5)",
  }));
}

// indicator id 별 series 생성·데이터 적용.
function applyIndicator(id) {
  // 기존 series 제거.
  removeIndicator(id);
  if (candleData.length === 0) return;
  // overlays — 메인 차트 위에 그림 (SMA/EMA/BB).
  // oscillators — 별도 pane (RSI/MACD/Stoch/Volume) — ensurePane(id) 가 pane 인스턴스 생성.
  switch (id) {
    case "sma20": {
      const s = mainChart.addLineSeries({ color: IND_COLORS.sma20, lineWidth: 1, priceLineVisible: false });
      s.setData(calcSMA(candleData, 20));
      indSeries[id] = { series: [s], pane: null };
      break;
    }
    case "sma50": {
      const s = mainChart.addLineSeries({ color: IND_COLORS.sma50, lineWidth: 1, priceLineVisible: false });
      s.setData(calcSMA(candleData, 50));
      indSeries[id] = { series: [s], pane: null };
      break;
    }
    case "ema9": {
      const s = mainChart.addLineSeries({ color: IND_COLORS.ema9, lineWidth: 1, priceLineVisible: false });
      s.setData(calcEMA(candleData, 9));
      indSeries[id] = { series: [s], pane: null };
      break;
    }
    case "bb20": {
      const upper = mainChart.addLineSeries({ color: IND_COLORS.bb20, lineWidth: 1, priceLineVisible: false, lineStyle: 2 });
      const lower = mainChart.addLineSeries({ color: IND_COLORS.bb20, lineWidth: 1, priceLineVisible: false, lineStyle: 2 });
      const bb = calcBB(candleData, 20, 2);
      upper.setData(bb.map(b => ({ time: b.time, value: b.upper })));
      lower.setData(bb.map(b => ({ time: b.time, value: b.lower })));
      indSeries[id] = { series: [upper, lower], pane: null };
      break;
    }
    case "rsi14": {
      const p = ensurePane("rsi14");
      const s = p.chart.addLineSeries({
        color: IND_COLORS.rsi14, lineWidth: 1, priceLineVisible: false,
      });
      s.setData(calcRSI(candleData, 14));
      p.primary = s;
      indSeries[id] = { series: [s], pane: "rsi14" };
      break;
    }
    case "macd": {
      const p = ensurePane("macd");
      const m  = p.chart.addLineSeries({ color: IND_COLORS.macd_line, lineWidth: 1, priceLineVisible: false });
      const sg = p.chart.addLineSeries({ color: IND_COLORS.macd_signal, lineWidth: 1, priceLineVisible: false });
      const h  = p.chart.addHistogramSeries({ priceLineVisible: false });
      const calc = calcMACD(candleData, 12, 26, 9);
      m.setData(calc.macd);
      sg.setData(calc.signal);
      h.setData(calc.hist);
      p.primary = m;
      indSeries[id] = { series: [m, sg, h], pane: "macd" };
      break;
    }
    case "stoch": {
      const p = ensurePane("stoch");
      const kSer = p.chart.addLineSeries({ color: IND_COLORS.stoch_k, lineWidth: 1, priceLineVisible: false });
      const dSer = p.chart.addLineSeries({ color: IND_COLORS.stoch_d, lineWidth: 1, priceLineVisible: false });
      const c = calcStoch(candleData, 14, 3);
      kSer.setData(c.k);
      dSer.setData(c.d);
      p.primary = kSer;
      indSeries[id] = { series: [kSer, dSer], pane: "stoch" };
      break;
    }
    case "vol": {
      const p = ensurePane("vol");
      const s = p.chart.addHistogramSeries({
        priceLineVisible: false,
        priceFormat: { type: "volume" },
      });
      s.setData(calcVolume(candleData));
      p.primary = s;
      indSeries[id] = { series: [s], pane: "vol" };
      break;
    }
  }
  // pane 추가 직후엔 메인 timeScale 의 현재 visible range 와 sync.
  syncPaneToMain(id);
}

function syncPaneToMain(id) {
  const entry = indSeries[id];
  if (!entry || !entry.pane) return;
  const range = mainChart.timeScale().getVisibleLogicalRange();
  if (range) {
    panes[entry.pane].chart.timeScale().setVisibleLogicalRange(range);
  }
}

function removeIndicator(id) {
  const entry = indSeries[id];
  if (!entry) return;
  // pane 기반 indicator 는 pane 통째 제거 (해당 pane 의 series 도 같이 정리됨).
  if (entry.pane) {
    removePane(entry.pane);
  } else {
    for (const s of entry.series) mainChart.removeSeries(s);
  }
  delete indSeries[id];
}

// 모든 활성 indicator 재계산 (historical 로드 후 / 라이브 봉 도착 후).
function recomputeAllIndicators() {
  for (const id of indActive) applyIndicator(id);
}

// ───────── 상태 ─────────
let currentPair = "USD/KRW";
let currentTF = "1m";
let currentRange = "4h";
let ws = null;
let barCount = 0;
let autoScroll = true;

// ───────── REST 로 historical 로드 ─────────
function rangeToDuration(range) {
  switch (range) {
    case "1h":  return 1 * 3600 * 1000;
    case "4h":  return 4 * 3600 * 1000;
    case "1d":  return 24 * 3600 * 1000;
    case "1w":  return 7 * 24 * 3600 * 1000;
    case "1mo": return 30 * 24 * 3600 * 1000;
    default:    return 4 * 3600 * 1000;
  }
}
async function loadHistorical() {
  const to = new Date();
  const from = new Date(to.getTime() - rangeToDuration(currentRange));
  const url = "/v1/chart"
    + "?pair=" + encodeURIComponent(currentPair)
    + "&tf="   + encodeURIComponent(currentTF)
    + "&from=" + encodeURIComponent(from.toISOString())
    + "&to="   + encodeURIComponent(to.toISOString())
    + "&limit=5000";
  try {
    setStatus("loading…");
    const resp = await fetch(url, { credentials: "same-origin" });
    if (!resp.ok) {
      setStatus("로드 실패: HTTP " + resp.status, "err");
      candleSeries.setData([]);
      barCount = 0;
      $("#bar-count").textContent = "0";
      return;
    }
    const data = await resp.json();
    const bars = (data.bars || []).map(barToCandle);
    candleData = bars;
    candleSeries.setData(bars);
    barCount = bars.length;
    $("#bar-count").textContent = barCount;
    if (bars.length > 0) {
      updateRecentDisplay(bars[bars.length - 1]);
    } else {
      ["cur-open","cur-high","cur-low","cur-close","cur-ticks"].forEach(id => $("#" + id).textContent = "—");
    }
    recomputeAllIndicators();
    if (autoScroll) mainChart.timeScale().scrollToRealTime();
    setStatus(currentPair + " " + currentTF + " · " + bars.length + "건 로드됨", "ok");
  } catch (e) {
    setStatus("로드 에러: " + e.message, "err");
  }
}

// Bar (REST) 또는 라이브 (WS) 의 OHLC bid/ask 를 mid 캔들로 변환.
// FX 는 단일 mid 캔들이 표준 — 정확한 spread 표시는 별도 indicator 가 필요할 때만.
function barToCandle(b) {
  const t = Math.floor(new Date(b.opened_at).getTime() / 1000); // UNIX seconds
  const o = (b.open_bid + b.open_ask) / 2;
  const h = (b.high_bid + b.high_ask) / 2;
  const l = (b.low_bid + b.low_ask) / 2;
  const c = (b.close_bid + b.close_ask) / 2;
  return { time: t, open: o, high: h, low: l, close: c, _raw: b };
}

function updateRecentDisplay(candle) {
  $("#cur-open").textContent  = fmt(candle.open);
  $("#cur-high").textContent  = fmt(candle.high);
  $("#cur-low").textContent   = fmt(candle.low);
  $("#cur-close").textContent = fmt(candle.close);
  $("#cur-ticks").textContent = candle._raw ? candle._raw.tick_count : "—";
  $("#last-update").textContent = new Date().toLocaleTimeString("ko-KR");
}

// ───────── WS 라이브 ─────────
function connectWS() {
  if (ws) {
    try { ws.close(); } catch (_) {}
  }
  const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
  const url = proto + "//" + window.location.host
    + "/v1/chart/stream"
    + "?pairs=" + encodeURIComponent(currentPair)
    + "&tfs="  + encodeURIComponent(currentTF);
  ws = new WebSocket(url);
  $("#ws-state").style.color = "var(--text-muted)";
  ws.onopen = () => {
    $("#ws-state").style.color = "var(--good)";
    setStatus("WS 연결됨", "ok");
  };
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (_) { return; }
    if (msg.type !== "bar") return;
    // 필터 — pair/tf 가 현재 보고 있는 것과 다르면 무시 (서버 필터 외 추가 안전).
    if (msg.pair !== currentPair || msg.tf !== currentTF) return;
    const candle = barToCandle(msg);
    candleSeries.update(candle);
    // candleData 에 append / 같은 시각이면 갱신.
    if (candleData.length > 0 && candleData[candleData.length - 1].time === candle.time) {
      candleData[candleData.length - 1] = candle;
    } else {
      candleData.push(candle);
      barCount += 1;
      $("#bar-count").textContent = barCount;
    }
    // 활성 indicator 만 재계산 (가장 최근 값 위주 — 단순화: 전체 재적용).
    recomputeAllIndicators();
    updateRecentDisplay(candle);
    // alert 임계값 평가 — 새 봉 또는 봉 갱신 후.
    evaluateAlerts(candle);
  };
  ws.onerror = () => {
    $("#ws-state").style.color = "var(--bad)";
    setStatus("WS 에러 — 재연결 시도 중", "err");
  };
  ws.onclose = () => {
    $("#ws-state").style.color = "var(--bad)";
    // 5초 후 재연결.
    setTimeout(connectWS, 5000);
  };
}

// ───────── 컨트롤 wiring ─────────
$("#sel-pair").addEventListener("change", (e) => {
  currentPair = e.target.value;
  saveSettings();
  refreshAll();
});
$$(".tf-btn").forEach(b => {
  b.addEventListener("click", () => {
    currentTF = b.dataset.tf;
    setActive(".tf-btn", currentTF);
    saveSettings();
    refreshAll();
  });
});
$$(".range-btn").forEach(b => {
  b.addEventListener("click", () => {
    currentRange = b.dataset.range;
    setActive(".range-btn", currentRange);
    saveSettings();
    loadHistorical(); // WS 는 그대로
  });
});
$("#reload").addEventListener("click", refreshAll);
$("#autoscroll").addEventListener("click", () => {
  autoScroll = !autoScroll;
  $("#autoscroll").dataset.active = autoScroll ? "true" : "false";
  saveSettings();
  if (autoScroll) mainChart.timeScale().scrollToRealTime();
});
$$(".ind-btn").forEach(b => {
  b.addEventListener("click", () => {
    const id = b.dataset.ind;
    if (indActive.has(id)) {
      indActive.delete(id);
      removeIndicator(id);
      b.dataset.active = "false";
    } else {
      indActive.add(id);
      applyIndicator(id);
      b.dataset.active = "true";
    }
    saveSettings();
  });
});

// Alerts 컨트롤 wiring.
$("#alert-add").addEventListener("click", openAlertModal);
$("#alert-toggle-list").addEventListener("click", () => {
  const list = $("#alert-list");
  list.classList.toggle("hidden");
});
$("#alert-permission").addEventListener("click", async () => {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    try { await Notification.requestPermission(); } catch (_) {}
  }
  refreshNotificationPermissionUI();
});
$("#am-save").addEventListener("click", () => {
  const t = $("#am-type").value;
  if (alertTypeNeedsValue(t)) {
    const v = $("#am-value").value;
    if (!v || isNaN(Number(v))) {
      alert("임계값은 숫자여야 합니다");
      return;
    }
    addAlert(t, Number(v));
  } else {
    addAlert(t, 0); // crossover — value 무시
  }
  closeAlertModal();
});

// type 변경 시 value 입력 표시/숨김.
$("#am-type").addEventListener("change", () => {
  const t = $("#am-type").value;
  $("#am-value-row").style.display = alertTypeNeedsValue(t) ? "" : "none";
});

function refreshAll() {
  loadHistorical();
  connectWS();
}

// ───────── 초기화 ─────────
// localStorage 복원 — UI 컨트롤 + 활성 indicator 반영. refreshAll 이전에 적용.
(function restoreSettings() {
  const s = loadSavedSettings();
  if (!s) return;
  // pair — 사전 정의 option 에 있을 때만 (custom pair 보안 차원에서).
  if (s.pair && Array.from($("#sel-pair").options).some(o => o.value === s.pair)) {
    currentPair = s.pair;
    $("#sel-pair").value = s.pair;
  }
  // TF
  if (s.tf && $$(".tf-btn").some(b => b.dataset.tf === s.tf)) {
    currentTF = s.tf;
    setActive(".tf-btn", currentTF);
  }
  // range
  if (s.range && $$(".range-btn").some(b => b.dataset.range === s.range)) {
    currentRange = s.range;
    setActive(".range-btn", currentRange);
  }
  // autoScroll
  if (typeof s.autoScroll === "boolean") {
    autoScroll = s.autoScroll;
    $("#autoscroll").dataset.active = autoScroll ? "true" : "false";
  }
  // indicators — 저장된 ID 만 활성. ind-btn 의 data-active 도 반영.
  // applyIndicator 호출은 refreshAll 의 historical 로드 직후 recomputeAllIndicators
  // 가 처리하므로 여기선 set + 버튼 상태만.
  if (Array.isArray(s.indicators)) {
    const knownIds = new Set($$(".ind-btn").map(b => b.dataset.ind));
    for (const id of s.indicators) {
      if (!knownIds.has(id)) continue;
      indActive.add(id);
      const btn = $$(".ind-btn").find(b => b.dataset.ind === id);
      if (btn) btn.dataset.active = "true";
    }
  }
})();

// Alerts 로드 + 권한 상태 표시.
loadAlerts();
renderAlertList();
refreshNotificationPermissionUI();

resizeAllPanes();
refreshAll();
</script>
