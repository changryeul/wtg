# WTG Prometheus scrape config (dev).
# 운영에서는 mci-price 가 별도 host 면 targets 수정.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: dev

scrape_configs:
  # mci-price /metrics — P6 (cross/pricing/master) + quoteid + http + broker.
  - job_name: mci-price
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          service: mci-price

  # quote-forwarder /metrics — feed별 throughput / drop.
  - job_name: quote-forwarder
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          service: quote-forwarder

  # mci-edge-price /metrics (옵션 — 활성 시).
  - job_name: mci-edge-price
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          service: mci-edge-price

  # mci-edge-api /metrics — P7-A rate limit + auth + http.
  - job_name: mci-edge-api
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:8090"]
        labels:
          service: mci-edge-api

  # Prometheus 자기 자신.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
