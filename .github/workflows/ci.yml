# WTG (Winway Trading Gateway) — CI 워크플로우
#
# PR / main 푸시 시점에 다음을 검증한다:
#   - lint (gofmt + go vet + staticcheck) + govulncheck
#   - 단위 테스트 (race + coverage) — Go 1.23 / 1.25 matrix
#   - 통합 테스트 — testcontainers (TimescaleDB) + embedded etcd
#   - 모든 cmd/ 빌드 + artifact 업로드
#
# CI 가 모두 Makefile target 을 호출하므로 `make ci` 로 로컬에서 동일하게 재현 가능.
# Go 1.25 가 기본 (go.mod) 이지만 1.23 호환도 검증 — CLAUDE.md 정책.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동일 PR 의 새 push 시 이전 실행 취소.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # 1.23 을 canary — 1.24+ 전용 API 도입 시 fmt/vet 단계에서 잡힘.
          go-version: '1.23'
          cache: true

      - name: make lint (fmt-check + vet + staticcheck)
        run: make lint

      - name: make vulncheck (govulncheck)
        run: make vulncheck

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23', '1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go mod download
        run: go mod download

      - name: make test-race
        run: make test-race

      - name: 커버리지 요약
        run: go tool cover -func=coverage.out | tail -20

      # 커버리지는 canary (1.23) 결과만 보관 — matrix 중복 방지.
      - name: 커버리지 artifact 업로드
        if: matrix.go == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  integration:
    name: Integration (testcontainers + embedded etcd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: go mod download
        run: go mod download

      # ubuntu-latest 는 Docker 데몬 active — testcontainers 가 TimescaleDB 컨테이너를
      # 자동 생성. embedded etcd 는 in-process 라 외부 의존성 없음.
      - name: make test-integration
        run: make test-integration

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: make build
        run: make build

      - name: 빌드 결과물 artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-amd64
          path: build/bin/
          retention-days: 7
