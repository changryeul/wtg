# WTG production docker-compose — EC2 (Rocky Linux 9.7, t3.xlarge).
#
# 배포 흐름:
#   git push master
#     → GitHub Actions (.github/workflows/deploy.yml)
#     → docker build → GHCR push
#     → SSH deploy: docker compose pull + up -d
#
# 사용:
#   cd ~/wtg
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# 종료:
#   docker compose -f docker-compose.prod.yml down
#
# ─── 전제 ──────────────────────────────────────────────────────
#   - broker (mymqd) 는 같은 EC2 에 이미 running (127.0.0.1:11217)
#   - network_mode: host → 컨테이너가 EC2 host network 공유
#     → 서비스간 통신은 127.0.0.1:<port>, broker 접근도 동일
#     → compose service DNS (mci-price:8082) 사용 불가 — 하지만
#       WTG 컨벤션이 127.0.0.1 참조라 문제 없음
#   - etcd 는 별도 컨테이너 (dev 의 admin embedded 아님).
#     운영 SoT — 카운터파티/카탈로그 유지.
#   - 사내 접근: EC2 private IP (10.0.1.106) 통해서만.
#     Security Group 은 사내 CIDR 만 허용.
#
# ─── 환경변수 (~/.env 또는 shell export) ────────────────────────
#   WTG_VERSION           — 이미지 태그 (default: latest). CI 는 git sha 로 재정의.
#   BROKER_HOST           — broker 접속 host (default: 127.0.0.1, 같은 EC2)
#   BROKER_PORT           — broker 포트 (default: 11217)
#   FIX_PUSH_SECRET       — mci-edge-fix ExecutionReport drop copy 인증
#   MD_SEED_CP            — 초기 MD 카운터파티 seed (id=pw,site,tier,usid)
#   FIX_SEED_CP           — 초기 FIX 카운터파티 seed

x-wtg-common: &wtg-common
  image: ghcr.io/changryeul/wtg:${WTG_VERSION:-latest}
  restart: unless-stopped
  network_mode: host
  volumes:
    - ./etc:/app/etc:ro           # 카탈로그 파일 override (배포 시 CI 가 push)
    - ./logs:/app/logs            # log rotation 은 host 에서 (logrotate)
    - fix-store:/var/wtg/fix      # mci-edge-fix message store (재시작 시 seq 보존)

services:
  # ─── etcd — 운영 SoT (카탈로그 / 카운터파티 / 라우팅) ─────────
  etcd:
    image: bitnami/etcd:3.5
    container_name: wtg-etcd
    restart: unless-stopped
    network_mode: host
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_NAME=wtg-etcd-01
      - ETCD_LISTEN_CLIENT_URLS=http://127.0.0.1:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://127.0.0.1:2379
      - ETCD_LISTEN_PEER_URLS=http://127.0.0.1:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://127.0.0.1:2380
      - ETCD_INITIAL_CLUSTER=wtg-etcd-01=http://127.0.0.1:2380
    volumes:
      - etcd-data:/bitnami/etcd

  # ─── mci-price — 시세 코어 + AlgoStream ────────────────────
  mci-price:
    <<: *wtg-common
    container_name: wtg-mci-price
    depends_on: [etcd]
    command:
      - mci-price
      - --listen=:8082
      - --grpc=:50051
      - --broker-host=${BROKER_HOST:-127.0.0.1}
      - --broker-port=${BROKER_PORT:-11217}
      - --symbols=/app/etc/symbols.json
      - --pricing=/app/etc/pricing.json
      - --profiles=/app/etc/profiles.json
      - --etcd=http://127.0.0.1:2379
      - --enable-swap-lock
      - --dedup-same-price
      - --dedup-tick-size-multiplier=1.0
      - --algo-stream
      - --algo-ring-size=100000

  # ─── mci-edge-price — 사용자 ws fan-out ────────────────────
  mci-edge-price:
    <<: *wtg-common
    container_name: wtg-mci-edge-price
    depends_on: [mci-price]
    command:
      - mci-edge-price
      - --listen=:8083
      - --upstream=127.0.0.1:50051
      - --quote-stream
      - --customer-stream

  # ─── mci-admin — 운영 콘솔 (사내 사용자용) ─────────────────
  mci-admin:
    <<: *wtg-common
    container_name: wtg-mci-admin
    depends_on: [etcd]
    command:
      - mci-admin
      - --listen=:9090
      - --broker-host=${BROKER_HOST:-127.0.0.1}
      - --broker-port=${BROKER_PORT:-11217}
      - --etcd=http://127.0.0.1:2379
      - --edge-urls=http://127.0.0.1:8083

  # ─── mci-api — /v1/tx (매매 요청 → broker) ────────────────
  mci-api:
    <<: *wtg-common
    container_name: wtg-mci-api
    depends_on: [etcd]
    command:
      - mci-api
      - --listen=:8080
      - --broker-host=${BROKER_HOST:-127.0.0.1}
      - --broker-port=${BROKER_PORT:-11217}

  # ─── mci-edge-fix — FIX 4.4 주문 gateway ──────────────────
  mci-edge-fix:
    <<: *wtg-common
    container_name: wtg-mci-edge-fix
    depends_on: [etcd]
    command:
      - mci-edge-fix
      - --port=5001
      - --stats=127.0.0.1:5002
      - --sender=WTG
      - --tx-forward=http://127.0.0.1:8080/v1/tx
      - --push-secret=${FIX_PUSH_SECRET:-CHANGE_ME_IN_ENV}
      - --store-dir=/var/wtg/fix
      - --etcd=http://127.0.0.1:2379
      - --log-level=info

  # ─── mci-edge-md — FIX 4.4 시세 gateway ──────────────────
  mci-edge-md:
    <<: *wtg-common
    container_name: wtg-mci-edge-md
    depends_on: [mci-price]
    command:
      - mci-edge-md
      - --port=5011
      - --stats=127.0.0.1:5012
      - --sender=WTG_MD
      - --etcd=http://127.0.0.1:2379
      - --upstream=127.0.0.1:50051

volumes:
  etcd-data:
  fix-store:
