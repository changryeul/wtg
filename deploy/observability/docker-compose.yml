# WTG 운영 메트릭 + trace 시각화 — dev/dev-ops 용 docker-compose.
#
# 사용:
#   cd deploy/observability
#   docker compose up -d
#
# Grafana:    http://localhost:3030  (admin / admin — 초기 로그인 후 변경)
# Prometheus: http://localhost:9095  (9090 은 mci-admin 과 충돌해 9095 사용)
# Jaeger UI:  http://localhost:16686 (OTLP receiver :4317 gRPC, :4318 HTTP)
#
# WTG 서비스 trace 활성 (PR 2 — broker-tracing.md §8):
#   mci-api      --otel-endpoint=localhost:4317 --otel-insecure --otel-sample 0.1
#   mci-edge-api --otel-endpoint=localhost:4317 --otel-insecure
#
# Grafana 안에서 Jaeger trace 검색: Explore → Datasource: Jaeger.
#
# 종료:
#   docker compose down  (volume 보존)
#   docker compose down -v  (data 삭제)
#
# mci-price 가 host 의 :8082 에서 listen 한다고 가정 — host.docker.internal 으로 scrape.
# 운영에서는 mci-price 가 별도 host 면 prometheus.yml 의 targets 수정.

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: wtg-prometheus
    restart: unless-stopped
    ports:
      - "9095:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:10.4.2
    container_name: wtg-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=dark
      - GF_LOG_LEVEL=warn
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger

  # Jaeger all-in-one — OTLP receiver + collector + storage + UI 가 단일 컨테이너.
  # dev / dev-ops 용. 운영은 OTel Collector + Jaeger (또는 Tempo) 분리 권장.
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: wtg-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC (WTG --otel-endpoint 가 사용)
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # in-memory storage. 운영은 Elasticsearch/Cassandra/Badger 등 권장.
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=50000

volumes:
  prom-data:
  grafana-data:
