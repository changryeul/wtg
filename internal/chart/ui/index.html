<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WTG Chart · FX</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg-base: #070a13; --bg-card: #101727; --bg-elev: #172033;
    --border: #1f2a40; --text: #e2e8f0; --text-muted: #94a3b8;
    --accent: #22d3ee; --good: #10b981; --bad: #ef4444;
  }
  html, body { background: var(--bg-base); color: var(--text); }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .chip {
    padding: .15rem .5rem; border-radius: .5rem;
    background: var(--bg-elev); border: 1px solid var(--border);
    font-size: .7rem; cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip[data-active="true"] {
    background: rgba(34,211,238,0.1); border-color: var(--accent); color: var(--accent);
  }
  .panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 1rem;
  }
  .cell-active { box-shadow: 0 0 0 2px rgba(34,211,238,0.35); }
  select, input {
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--text); padding: .35rem .6rem; border-radius: .5rem;
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: .8rem;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); }
  /* layout grid */
  #charts-layout.layout-1   { display: grid; grid-template-columns: 1fr;       grid-template-rows: 1fr;       gap: .75rem; }
  #charts-layout.layout-2v  { display: grid; grid-template-columns: 1fr 1fr;   grid-template-rows: 1fr;       gap: .75rem; }
  #charts-layout.layout-2h  { display: grid; grid-template-columns: 1fr;       grid-template-rows: 1fr 1fr;   gap: .75rem; }
  #charts-layout.layout-2x2 { display: grid; grid-template-columns: 1fr 1fr;   grid-template-rows: 1fr 1fr;   gap: .75rem; }
  #charts-layout { height: calc(100vh - 200px); min-height: 600px; }
  .cell { min-height: 0; min-width: 0; display: flex; flex-direction: column; }
  .cell .chart-area { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
  .cell .chart-area > div { flex-shrink: 0; }
</style>
</head>
<body class="min-h-screen">

<!-- Alert 추가 모달 -->
<div id="alert-modal" class="fixed inset-0 z-40 hidden items-center justify-center p-4" style="background: rgba(7,10,19,0.8); backdrop-filter: blur(4px);">
  <div class="panel max-w-md w-full p-5 space-y-3">

    </div>

      </div>
      <div>
        <label class="text-xs text-slate-400">조건</label>
        <select id="am-type" class="w-full">
          <optgroup label="── 임계값 (값 필요) ──">

            <option value="price_cross_sma20_up">가격 > SMA(20) 상향돌파</option>
            <option value="price_cross_sma20_down">가격 < SMA(20) 하향이탈</option>

            <option value="sma_golden_cross_20_50">SMA(20) > SMA(50) Golden Cross</option>

        <label class="text-xs text-slate-400">임계값</label>

      </div>
      <div class="text-[11px] text-slate-500">
        한 번 trigger 되면 자동 비활성화됩니다 (one-shot).
      </div>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <button onclick="closeAlertModal()" class="chip">취소</button>
      <button id="am-save" class="chip" style="background: linear-gradient(to right, #06b6d4, #6366f1); color: #070a13; font-weight: 600;">저장</button>
    </div>
  </div>
</div>

<div class="max-w-[1700px] mx-auto p-3 space-y-3">
  <!-- 헤더 + Layout 선택 + 전역 Alerts -->
  <div class="flex flex-wrap items-center gap-3">
    <div>
      <h1 class="text-lg font-semibold">WTG Chart</h1>
      <p class="text-[11px] text-slate-400">FX OHLC · TimescaleDB historical + WS live · multi-pane / multi-chart</p>
    </div>
    <div class="flex items-center gap-1 ml-2">
      <label class="text-[10px] text-slate-400 uppercase tracking-widest mr-1">Layout</label>
      <button class="chip layout-btn" data-layout="1"   data-active="true">1</button>

      <button id="alert-add" class="chip">+ 신규</button>
      <button id="alert-toggle-list" class="chip">목록</button>

      <button id="alert-permission" class="chip" title="브라우저 알림 권한 요청">🔔 권한</button>
      <span id="alert-perm-state" class="text-[10px] text-slate-500 ml-1">—</span>
    </div>
  </div>
  <div id="alert-list" class="hidden text-xs space-y-1"></div>

  <!-- chart cells grid -->
  <div id="charts-layout" class="layout-1"></div>

  <div id="status" class="text-xs text-slate-500 font-mono"></div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// helpers
// ═════════════════════════════════════════════════════════════════════════════
const $ = (sel) => document.querySelector(sel);
const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));

function el(tag, opts, ...children) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.class) e.className = opts.class;
    if (opts.text != null) e.textContent = opts.text;
    if (opts.style) Object.assign(e.style, opts.style);
    if (opts.onclick) e.onclick = opts.onclick;
    if (opts.title) e.title = opts.title;
    if (opts.dataset) Object.assign(e.dataset, opts.dataset);
    if (opts.attrs) for (const k in opts.attrs) e.setAttribute(k, opts.attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function fmt(x) { return x == null ? "—" : x.toLocaleString(undefined, {maximumFractionDigits: 5}); }

// ═════════════════════════════════════════════════════════════════════════════
// 영속 — settings (layout + per-cell config) + alerts (전역)
// ═════════════════════════════════════════════════════════════════════════════
const LS_SETTINGS    = "wtg_chart_settings_v2"; // v1 → v2 (cells array 추가)
const LS_ALERTS      = "wtg_chart_alerts_v1";
const LS_ALERT_SOUND = "wtg_chart_alert_sound_v1";

function loadSavedSettings() {
  try {
    const raw = localStorage.getItem(LS_SETTINGS);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (_) { return null; }
}
function saveSettings() {
  try {
    const cells = layoutManager.cells.map(c => c.snapshotConfig());
    const s = { layout: layoutManager.layout, cells };
    localStorage.setItem(LS_SETTINGS, JSON.stringify(s));
  } catch (_) {}
}

// ═════════════════════════════════════════════════════════════════════════════
// indicator color / 계산 함수 (pure)
// ═════════════════════════════════════════════════════════════════════════════
const IND_COLORS = {
  sma20: "#22d3ee", sma50: "#a78bfa", ema9: "#f59e0b", bb20: "#94a3b8",
  rsi14: "#22d3ee", vol: "#64748b",
  macd_line: "#22d3ee", macd_signal: "#f59e0b",
  stoch_k: "#22d3ee", stoch_d: "#f59e0b",
};

function calcSMA(candles, n) {
  const out = []; let sum = 0;
  for (let i = 0; i < candles.length; i++) {
    sum += candles[i].close;
    if (i >= n) sum -= candles[i - n].close;
    if (i >= n - 1) out.push({ time: candles[i].time, value: sum / n });
  }
  return out;
}
function calcEMA(candles, n) {
  if (candles.length < n) return [];
  const k = 2 / (n + 1); const out = [];
  let sum = 0; for (let i = 0; i < n; i++) sum += candles[i].close;
  let ema = sum / n; out.push({ time: candles[n - 1].time, value: ema });
  for (let i = n; i < candles.length; i++) {
    ema = candles[i].close * k + ema * (1 - k);
    out.push({ time: candles[i].time, value: ema });
  }
  return out;
}
function calcBB(candles, n, kMul) {
  const out = []; if (candles.length < n) return out;
  for (let i = n - 1; i < candles.length; i++) {
    let sum = 0;
    for (let j = i - n + 1; j <= i; j++) sum += candles[j].close;
    const mid = sum / n;
    let varSum = 0;
    for (let j = i - n + 1; j <= i; j++) { const d = candles[j].close - mid; varSum += d * d; }
    const sd = Math.sqrt(varSum / n);
    out.push({ time: candles[i].time, mid, upper: mid + kMul * sd, lower: mid - kMul * sd });
  }
  return out;
}
function calcRSI(candles, n) {
  const out = []; if (candles.length <= n) return out;
  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= n; i++) {
    const ch = candles[i].close - candles[i - 1].close;
    if (ch >= 0) avgGain += ch; else avgLoss += -ch;
  }
  avgGain /= n; avgLoss /= n;
  let rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
  out.push({ time: candles[n].time, value: avgLoss === 0 ? 100 : 100 - 100 / (1 + rs) });
  for (let i = n + 1; i < candles.length; i++) {
    const ch = candles[i].close - candles[i - 1].close;
    const gain = ch > 0 ? ch : 0;
    const loss = ch < 0 ? -ch : 0;
    avgGain = (avgGain * (n - 1) + gain) / n;
    avgLoss = (avgLoss * (n - 1) + loss) / n;
    rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
    out.push({ time: candles[i].time, value: avgLoss === 0 ? 100 : 100 - 100 / (1 + rs) });
  }
  return out;
}
function calcMACD(candles, fast, slow, sig) {
  const out = { macd: [], signal: [], hist: [] };
  if (candles.length < slow + sig) return out;
  const emaArr = (n) => {
    const arr = new Array(candles.length).fill(null);
    if (candles.length < n) return arr;
    const k = 2 / (n + 1); let sum = 0;
    for (let i = 0; i < n; i++) sum += candles[i].close;
    let e = sum / n; arr[n - 1] = e;
    for (let i = n; i < candles.length; i++) {
      e = candles[i].close * k + e * (1 - k); arr[i] = e;
    }
    return arr;
  };
  const ef = emaArr(fast); const es = emaArr(slow);
  const macdVals = new Array(candles.length).fill(null);
  for (let i = slow - 1; i < candles.length; i++) {
    if (ef[i] != null && es[i] != null) {
      macdVals[i] = ef[i] - es[i];
      out.macd.push({ time: candles[i].time, value: macdVals[i] });
    }
  }
  const firstMacdIdx = slow - 1;
  if (candles.length < firstMacdIdx + sig) return out;
  let sigSum = 0;
  for (let i = 0; i < sig; i++) sigSum += macdVals[firstMacdIdx + i];
  let signalEMA = sigSum / sig;
  const sigStart = firstMacdIdx + sig - 1;
  out.signal.push({ time: candles[sigStart].time, value: signalEMA });
  const k = 2 / (sig + 1);
  for (let i = sigStart + 1; i < candles.length; i++) {
    signalEMA = macdVals[i] * k + signalEMA * (1 - k);
    out.signal.push({ time: candles[i].time, value: signalEMA });
  }
  const sigMap = new Map(out.signal.map(s => [s.time, s.value]));
  for (const m of out.macd) {
    const sv = sigMap.get(m.time); if (sv == null) continue;
    const v = m.value - sv;
    out.hist.push({ time: m.time, value: v,
      color: v >= 0 ? "rgba(16,185,129,0.5)" : "rgba(239,68,68,0.5)" });
  }
  return out;
}
function calcStoch(candles, kPeriod, dPeriod) {
  const out = { k: [], d: [] };
  if (candles.length < kPeriod) return out;
  for (let i = kPeriod - 1; i < candles.length; i++) {
    let hh = -Infinity, ll = Infinity;
    for (let j = i - kPeriod + 1; j <= i; j++) {
      if (candles[j].high > hh) hh = candles[j].high;
      if (candles[j].low < ll) ll = candles[j].low;
    }
    const range = hh - ll;
    const kVal = range === 0 ? 50 : 100 * (candles[i].close - ll) / range;
    out.k.push({ time: candles[i].time, value: kVal });
  }
  if (out.k.length < dPeriod) return out;
  for (let i = dPeriod - 1; i < out.k.length; i++) {
    let sum = 0;
    for (let j = i - dPeriod + 1; j <= i; j++) sum += out.k[j].value;
    out.d.push({ time: out.k[i].time, value: sum / dPeriod });
  }
  return out;
}
function calcVolume(candles) {
  return candles.map(c => ({
    time: c.time, value: c._raw ? c._raw.tick_count : 0,
    color: c.close >= c.open ? "rgba(16,185,129,0.5)" : "rgba(239,68,68,0.5)",
  }));
}

function rangeToDuration(range) {
  switch (range) {
    case "1h":  return 1 * 3600 * 1000;
    case "4h":  return 4 * 3600 * 1000;
    case "1d":  return 24 * 3600 * 1000;
    case "1w":  return 7 * 24 * 3600 * 1000;
    case "1mo": return 30 * 24 * 3600 * 1000;
    default:    return 4 * 3600 * 1000;
  }
}
function barToCandle(b) {
  const t = Math.floor(new Date(b.opened_at).getTime() / 1000);
  const o = (b.open_bid + b.open_ask) / 2;
  const h = (b.high_bid + b.high_ask) / 2;
  const l = (b.low_bid + b.low_ask) / 2;
  const c = (b.close_bid + b.close_ask) / 2;
  return { time: t, open: o, high: h, low: l, close: c, _raw: b };
}

const PAIRS = [
  "USD/KRW","EUR/KRW","JPY/KRW","GBP/KRW","AUD/KRW","CNY/KRW",
  "EUR/USD","USD/JPY","GBP/USD","AUD/USD",
];
const TFS = ["1m","5m","15m","1h","1d"];
const RANGES = ["1h","4h","1d","1w","1mo"];
const IND_DEFS = [
  { id: "sma20", label: "SMA20" },
  { id: "sma50", label: "SMA50" },
  { id: "ema9",  label: "EMA9"  },
  { id: "bb20",  label: "BB"    },
  { id: "rsi14", label: "RSI"   },
  { id: "macd",  label: "MACD"  },
  { id: "stoch", label: "Stoch" },
  { id: "vol",   label: "Vol"   },
];

// ═════════════════════════════════════════════════════════════════════════════
// ChartCell — 단일 차트 인스턴스. 다중 layout 의 각 셀에 1:1.
// ═════════════════════════════════════════════════════════════════════════════
class ChartCell {
  constructor(idx, config) {
    this.idx = idx;
    this.pair = (config && config.pair) || "USD/KRW";
    this.tf = (config && config.tf) || "1m";
    this.range = (config && config.range) || "4h";
    this.autoScroll = (config && typeof config.autoScroll === "boolean") ? config.autoScroll : true;
    this.indActive = new Set((config && Array.isArray(config.indicators)) ? config.indicators : []);
    this.indSeries = {};
    this.panes = {};   // {id:{chart,el,primary}}
    this.candleData = [];
    this.barCount = 0;
    this.ws = null;
    this.destroyed = false;
    this._syncingRange = false;
    this._syncingCross = false;

    this.root = this.buildDOM();
    this.buildChart();
    this.wireControls();
  }

  snapshotConfig() {
    return {
      pair: this.pair, tf: this.tf, range: this.range,
      autoScroll: this.autoScroll, indicators: Array.from(this.indActive),
    };
  }

  buildDOM() {
    const root = el("div", { class: "panel p-2 cell flex flex-col gap-2",
      dataset: { cellIdx: String(this.idx) },
      onclick: () => layoutManager.setActiveCell(this.idx),
    });

    // 헤더 — pair / TF / range / indicators / autoscroll / 최근봉.
    const header = el("div", { class: "flex flex-wrap items-center gap-2 text-[11px]" });

    const pairSel = el("select", { class: "ws-pair" });
    pairSel.style.fontSize = ".75rem";
    for (const p of PAIRS) {
      const opt = el("option", { text: p });
      opt.value = p;
      if (p === this.pair) opt.selected = true;
      pairSel.appendChild(opt);
    }
    pairSel.addEventListener("change", () => { this.pair = pairSel.value; saveSettings(); this.refresh(); });
    header.appendChild(pairSel);

    const tfGroup = el("div", { class: "flex gap-1" });
    for (const t of TFS) {
      const b = el("button", { class: "chip", text: t, dataset: { tf: t } });
      if (t === this.tf) b.dataset.active = "true";
      b.addEventListener("click", () => {
        this.tf = t;
        tfGroup.querySelectorAll(".chip").forEach(x => x.dataset.active = (x.dataset.tf === t) ? "true" : "false");
        saveSettings(); this.refresh();
      });
      tfGroup.appendChild(b);
    }
    header.appendChild(tfGroup);

    const rangeGroup = el("div", { class: "flex gap-1" });
    for (const r of RANGES) {
      const b = el("button", { class: "chip", text: r.toUpperCase(), dataset: { range: r } });
      if (r === this.range) b.dataset.active = "true";
      b.addEventListener("click", () => {
        this.range = r;
        rangeGroup.querySelectorAll(".chip").forEach(x => x.dataset.active = (x.dataset.range === r) ? "true" : "false");
        saveSettings(); this.loadHistorical();
      });
      rangeGroup.appendChild(b);
    }
    header.appendChild(rangeGroup);

    const autoBtn = el("button", { class: "chip", text: "▶ Auto" });
    if (this.autoScroll) autoBtn.dataset.active = "true";
    autoBtn.addEventListener("click", () => {
      this.autoScroll = !this.autoScroll;
      autoBtn.dataset.active = this.autoScroll ? "true" : "false";
      saveSettings();
      if (this.autoScroll) this.mainChart.timeScale().scrollToRealTime();
    });
    header.appendChild(autoBtn);

    const indGroup = el("div", { class: "flex gap-1 flex-wrap" });
    for (const def of IND_DEFS) {
      const b = el("button", { class: "chip", text: def.label, dataset: { ind: def.id } });
      if (this.indActive.has(def.id)) b.dataset.active = "true";
      b.addEventListener("click", () => {
        if (this.indActive.has(def.id)) {
          this.indActive.delete(def.id); this.removeIndicator(def.id);
          b.dataset.active = "false";
        } else {
          this.indActive.add(def.id); this.applyIndicator(def.id);
          b.dataset.active = "true";
        }
        saveSettings();
      });
      indGroup.appendChild(b);
    }
    header.appendChild(indGroup);

    const recent = el("div", { class: "text-[10px] font-mono ml-auto text-slate-400 hidden lg:flex gap-3 items-center" });
    this._recentO = el("span", { class: "text-slate-200", text: "—" });
    this._recentH = el("span", { class: "text-green-400", text: "—" });
    this._recentL = el("span", { class: "text-red-400", text: "—" });
    this._recentC = el("span", { class: "text-cyan-300", text: "—" });
    this._wsState = el("span", { class: "font-mono", text: "●" });
    this._wsState.style.color = "var(--text-muted)";
    recent.appendChild(el("span", null, "O ", this._recentO));
    recent.appendChild(el("span", null, "H ", this._recentH));
    recent.appendChild(el("span", null, "L ", this._recentL));
    recent.appendChild(el("span", null, "C ", this._recentC));
    recent.appendChild(this._wsState);
    header.appendChild(recent);

    root.appendChild(header);

    // chart area — main + dynamic panes.
    const chartArea = el("div", { class: "chart-area" });
    this._chartMain = el("div", { class: "flex-1" });
    this._chartMain.style.minHeight = "200px";
    chartArea.appendChild(this._chartMain);
    root.appendChild(chartArea);
    this._chartArea = chartArea;

    return root;
  }

  buildChart() {
    const baseOpts = () => ({
      layout: {
        background: { type: "solid", color: "#101727" },
        textColor: "#cbd5e1",
        fontFamily: "JetBrains Mono, ui-monospace, monospace",
      },
      grid: {
        vertLines: { color: "rgba(255,255,255,0.05)" },
        horzLines: { color: "rgba(255,255,255,0.05)" },
      },
      rightPriceScale: { borderColor: "#1f2a40" },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    });
    this.mainChart = LightweightCharts.createChart(this._chartMain, {
      ...baseOpts(),
      timeScale: { borderColor: "#1f2a40", timeVisible: true, secondsVisible: false },
    });
    this.candleSeries = this.mainChart.addCandlestickSeries({
      upColor: "#10b981", downColor: "#ef4444",
      borderUpColor: "#10b981", borderDownColor: "#ef4444",
      wickUpColor: "#10b981", wickDownColor: "#ef4444",
    });
    this.mainPrimary = this.candleSeries;
    this._attachIntraCellSync(this.mainChart);
  }

  // 셀 내부 sync — 메인 ↔ 각 pane.
  _attachIntraCellSync(chart) {
    chart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
      if (this._syncingRange || !range) return;
      this._syncingRange = true;
      const all = this._allCharts();
      for (const c of all) {
        if (c.chart !== chart) c.chart.timeScale().setVisibleLogicalRange(range);
      }
      this._syncingRange = false;
    });
    chart.subscribeCrosshairMove((param) => {
      if (this._syncingCross) return;
      this._syncingCross = true;
      try {
        if (!param || !param.time) {
          for (const c of this._allCharts()) {
            if (c.chart !== chart) c.chart.clearCrosshairPosition();
          }
          return;
        }
        for (const c of this._allCharts()) {
          if (c.chart === chart) continue;
          if (!c.primary) continue;
          let price = 0;
          const data = param.seriesData ? param.seriesData.get(c.primary) : null;
          if (data && typeof data.value === "number") price = data.value;
          else if (data && typeof data.close === "number") price = data.close;
          c.chart.setCrosshairPosition(price, param.time, c.primary);
        }
      } finally { this._syncingCross = false; }
    });
  }

  _allCharts() {
    const out = [{ chart: this.mainChart, primary: this.mainPrimary }];
    for (const id in this.panes) {
      out.push({ chart: this.panes[id].chart, primary: this.panes[id].primary });
    }
    return out;
  }

  ensurePane(id) {
    if (this.panes[id]) return this.panes[id];
    const div = el("div");
    div.style.height = "120px";
    div.style.marginTop = "4px";
    div.style.borderTop = "1px solid var(--border)";
    this._chartArea.appendChild(div);
    const c = LightweightCharts.createChart(div, {
      layout: { background: { type: "solid", color: "#101727" }, textColor: "#cbd5e1",
                fontFamily: "JetBrains Mono, ui-monospace, monospace" },
      grid: { vertLines: { color: "rgba(255,255,255,0.05)" }, horzLines: { color: "rgba(255,255,255,0.05)" } },
      rightPriceScale: { borderColor: "#1f2a40" },
      timeScale: { borderColor: "#1f2a40", visible: false },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    });
    this._attachIntraCellSync(c);
    c.applyOptions({ width: this._chartMain.clientWidth });
    this.panes[id] = { chart: c, el: div, primary: null };
    return this.panes[id];
  }

  removePane(id) {
    const p = this.panes[id]; if (!p) return;
    p.chart.remove(); p.el.remove();
    delete this.panes[id];
  }

  applyIndicator(id) {
    this.removeIndicator(id);
    if (this.candleData.length === 0) return;
    switch (id) {
      case "sma20": {
        const s = this.mainChart.addLineSeries({ color: IND_COLORS.sma20, lineWidth: 1, priceLineVisible: false });
        s.setData(calcSMA(this.candleData, 20));
        this.indSeries[id] = { series: [s], pane: null }; break;
      }
      case "sma50": {
        const s = this.mainChart.addLineSeries({ color: IND_COLORS.sma50, lineWidth: 1, priceLineVisible: false });
        s.setData(calcSMA(this.candleData, 50));
        this.indSeries[id] = { series: [s], pane: null }; break;
      }
      case "ema9": {
        const s = this.mainChart.addLineSeries({ color: IND_COLORS.ema9, lineWidth: 1, priceLineVisible: false });
        s.setData(calcEMA(this.candleData, 9));
        this.indSeries[id] = { series: [s], pane: null }; break;
      }
      case "bb20": {
        const u = this.mainChart.addLineSeries({ color: IND_COLORS.bb20, lineWidth: 1, priceLineVisible: false, lineStyle: 2 });
        const lo = this.mainChart.addLineSeries({ color: IND_COLORS.bb20, lineWidth: 1, priceLineVisible: false, lineStyle: 2 });
        const bb = calcBB(this.candleData, 20, 2);
        u.setData(bb.map(b => ({ time: b.time, value: b.upper })));
        lo.setData(bb.map(b => ({ time: b.time, value: b.lower })));
        this.indSeries[id] = { series: [u, lo], pane: null }; break;
      }
      case "rsi14": {
        const p = this.ensurePane("rsi14");
        const s = p.chart.addLineSeries({ color: IND_COLORS.rsi14, lineWidth: 1, priceLineVisible: false });
        s.setData(calcRSI(this.candleData, 14));
        p.primary = s;
        this.indSeries[id] = { series: [s], pane: "rsi14" }; break;
      }
      case "macd": {
        const p = this.ensurePane("macd");
        const m  = p.chart.addLineSeries({ color: IND_COLORS.macd_line, lineWidth: 1, priceLineVisible: false });
        const sg = p.chart.addLineSeries({ color: IND_COLORS.macd_signal, lineWidth: 1, priceLineVisible: false });
        const h  = p.chart.addHistogramSeries({ priceLineVisible: false });
        const calc = calcMACD(this.candleData, 12, 26, 9);
        m.setData(calc.macd); sg.setData(calc.signal); h.setData(calc.hist);
        p.primary = m;
        this.indSeries[id] = { series: [m, sg, h], pane: "macd" }; break;
      }
      case "stoch": {
        const p = this.ensurePane("stoch");
        const k = p.chart.addLineSeries({ color: IND_COLORS.stoch_k, lineWidth: 1, priceLineVisible: false });
        const d = p.chart.addLineSeries({ color: IND_COLORS.stoch_d, lineWidth: 1, priceLineVisible: false });
        const c = calcStoch(this.candleData, 14, 3);
        k.setData(c.k); d.setData(c.d);
        p.primary = k;
        this.indSeries[id] = { series: [k, d], pane: "stoch" }; break;
      }
      case "vol": {
        const p = this.ensurePane("vol");
        const s = p.chart.addHistogramSeries({ priceLineVisible: false, priceFormat: { type: "volume" } });
        s.setData(calcVolume(this.candleData));
        p.primary = s;
        this.indSeries[id] = { series: [s], pane: "vol" }; break;
      }
    }
  }

  removeIndicator(id) {
    const entry = this.indSeries[id]; if (!entry) return;
    if (entry.pane) this.removePane(entry.pane);
    else for (const s of entry.series) this.mainChart.removeSeries(s);
    delete this.indSeries[id];
  }

  recomputeAllIndicators() {
    for (const id of this.indActive) this.applyIndicator(id);
  }

  resize() {
    const w = this._chartMain.clientWidth;
    this.mainChart.applyOptions({ width: w });
    for (const id in this.panes) this.panes[id].chart.applyOptions({ width: w });
  }

  async loadHistorical() {
    const to = new Date();
    const from = new Date(to.getTime() - rangeToDuration(this.range));
    const url = "/v1/chart?pair=" + encodeURIComponent(this.pair) +
      "&tf=" + encodeURIComponent(this.tf) +
      "&from=" + encodeURIComponent(from.toISOString()) +
      "&to=" + encodeURIComponent(to.toISOString()) + "&limit=5000";
    try {
      const resp = await fetch(url, { credentials: "same-origin" });
      if (!resp.ok) {
        this.candleSeries.setData([]); this.candleData = []; this.barCount = 0;
        return;
      }
      const data = await resp.json();
      const bars = (data.bars || []).map(barToCandle);
      this.candleData = bars;
      this.candleSeries.setData(bars);
      this.barCount = bars.length;
      if (bars.length > 0) this._updateRecent(bars[bars.length - 1]);
      else this._updateRecent(null);
      this.recomputeAllIndicators();
      if (this.autoScroll) this.mainChart.timeScale().scrollToRealTime();
    } catch (e) {
      console.warn("loadHistorical:", e);
    }
  }

  connectWS() {
    if (this.ws) { try { this.ws.close(); } catch (_) {} }
    if (this.destroyed) return;
    const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
    const url = proto + "//" + window.location.host + "/v1/chart/stream"
      + "?pairs=" + encodeURIComponent(this.pair)
      + "&tfs=" + encodeURIComponent(this.tf);
    this.ws = new WebSocket(url);
    this._wsState.style.color = "var(--text-muted)";
    this.ws.onopen = () => { this._wsState.style.color = "var(--good)"; };
    this.ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch (_) { return; }
      if (msg.type !== "bar") return;
      if (msg.pair !== this.pair || msg.tf !== this.tf) return;
      const candle = barToCandle(msg);
      this.candleSeries.update(candle);
      if (this.candleData.length > 0 && this.candleData[this.candleData.length - 1].time === candle.time) {
        this.candleData[this.candleData.length - 1] = candle;
      } else {
        this.candleData.push(candle); this.barCount += 1;
      }
      this.recomputeAllIndicators();
      this._updateRecent(candle);
      evaluateAlertsForCell(this, candle);
    };
    this.ws.onerror = () => { this._wsState.style.color = "var(--bad)"; };
    this.ws.onclose = () => {
      this._wsState.style.color = "var(--bad)";
      if (!this.destroyed) setTimeout(() => this.connectWS(), 5000);
    };
  }

  _updateRecent(candle) {
    if (!candle) {
      this._recentO.textContent = this._recentH.textContent =
      this._recentL.textContent = this._recentC.textContent = "—";
      return;
    }
    this._recentO.textContent = fmt(candle.open);
    this._recentH.textContent = fmt(candle.high);
    this._recentL.textContent = fmt(candle.low);
    this._recentC.textContent = fmt(candle.close);
  }

  refresh() { this.loadHistorical(); this.connectWS(); }

  wireControls() { /* 모든 컨트롤은 buildDOM 에서 이미 wire 됨 */ }

  destroy() {
    this.destroyed = true;
    if (this.ws) try { this.ws.close(); } catch (_) {}
    try { this.mainChart.remove(); } catch (_) {}
    for (const id in this.panes) try { this.panes[id].chart.remove(); } catch (_) {}
    this.root.remove();
  }
}

// ═════════════════════════════════════════════════════════════════════════════
// LayoutManager — 1 / 2v / 2h / 2x2 grid 셀 관리
// ═════════════════════════════════════════════════════════════════════════════
const layoutManager = {
  layout: "1",
  cells: [],
  activeCellIdx: 0,

  setLayout(layout, savedCells) {
    this.layout = layout;
    const container = $("#charts-layout");
    container.className = "layout-" + layout;
    // 기존 셀 정리.
    for (const c of this.cells) c.destroy();
    this.cells = [];
    container.replaceChildren();
    const n = (layout === "1") ? 1 : (layout === "2x2") ? 4 : 2;
    for (let i = 0; i < n; i++) {
      const cfg = (savedCells && savedCells[i]) || null;
      const cell = new ChartCell(i, cfg);
      this.cells.push(cell);
      container.appendChild(cell.root);
    }
    this.activeCellIdx = 0;
    this._highlightActive();
    // 모든 셀 데이터 로드.
    for (const c of this.cells) c.refresh();
    // resize 한 번.
    setTimeout(() => { for (const c of this.cells) c.resize(); }, 50);
    // layout 버튼 상태.
    $$(".layout-btn").forEach(b => b.dataset.active = (b.dataset.layout === layout) ? "true" : "false");
    saveSettings();
  },

  setActiveCell(idx) {
    if (idx < 0 || idx >= this.cells.length) return;
    this.activeCellIdx = idx;
    this._highlightActive();
  },

  _highlightActive() {
    for (let i = 0; i < this.cells.length; i++) {
      this.cells[i].root.classList.toggle("cell-active", i === this.activeCellIdx);
    }
  },

  activeCell() { return this.cells[this.activeCellIdx]; },

  resizeAll() { for (const c of this.cells) c.resize(); },
};

// ═════════════════════════════════════════════════════════════════════════════
// Alerts — 전역. evaluateAlertsForCell 가 WS 콜백에서 호출됨.
// ═════════════════════════════════════════════════════════════════════════════
let alerts = [];

function loadAlerts() {
  try {
    const raw = localStorage.getItem(LS_ALERTS); if (!raw) return;
    const arr = JSON.parse(raw); if (Array.isArray(arr)) alerts = arr;
  } catch (_) {}
}
function saveAlerts() {
  try { localStorage.setItem(LS_ALERTS, JSON.stringify(alerts)); } catch (_) {}
}
function nextAlertId() {
  return "a_" + Math.random().toString(36).slice(2, 9) + "_" + Date.now().toString(36);
}
const ALERT_TYPE_LABEL = {
  price_above: "가격 ↑", price_below: "가격 ↓",
  rsi_above: "RSI ↑", rsi_below: "RSI ↓",
  price_cross_sma20_up: "가격 > SMA20", price_cross_sma20_down: "가격 < SMA20",
  price_cross_sma50_up: "가격 > SMA50", price_cross_sma50_down: "가격 < SMA50",
  sma_golden_cross_20_50: "SMA20 > SMA50 (Golden)",
  sma_death_cross_20_50:  "SMA20 < SMA50 (Death)",
  macd_cross_signal_up: "MACD > Signal", macd_cross_signal_down: "MACD < Signal",
  macd_cross_zero_up: "MACD > 0", macd_cross_zero_down: "MACD < 0",
  stoch_cross_d_up: "%K > %D", stoch_cross_d_down: "%K < %D",
  stoch_overbought: "%K > 80 (과매수)", stoch_oversold: "%K < 20 (과매도)",
};
function alertTypeNeedsValue(t) {
  return t === "price_above" || t === "price_below" || t === "rsi_above" || t === "rsi_below";
}

function addAlert(type, value, pair) {
  alerts.push({
    id: nextAlertId(), type, pair,
    value: alertTypeNeedsValue(type) ? Number(value) : 0,
    enabled: true, lastVal: null, lastDiff: null,
  });
  saveAlerts(); renderAlertList();
}
function removeAlert(id) {
  alerts = alerts.filter(a => a.id !== id); saveAlerts(); renderAlertList();
}
function toggleAlertEnabled(id) {
  const a = alerts.find(x => x.id === id); if (!a) return;
  a.enabled = !a.enabled;
  if (a.enabled) { a.lastVal = null; a.lastDiff = null; }
  saveAlerts(); renderAlertList();
}
function renderAlertList() {
  const list = $("#alert-list"); list.replaceChildren();
  $("#alert-count").textContent = alerts.filter(a => a.enabled).length;
  if (alerts.length === 0) {
    list.appendChild(el("div", { class: "text-slate-500", text: "등록된 알림이 없습니다." }));
    return;
  }
  for (const a of alerts) {
    const needsValue = alertTypeNeedsValue(a.type);
    const row = el("div", { class: "flex items-center gap-2 py-1 px-2 rounded",
      style: { background: a.enabled ? "rgba(34,211,238,0.06)" : "rgba(100,116,139,0.08)" } });
    const label = el("div", { class: "flex-1 font-mono", style: a.enabled ? {} : { opacity: "0.5" } },
      el("span", { class: "text-slate-300", text: a.pair }),
      " · ",
      el("span", { class: "text-cyan-300", text: ALERT_TYPE_LABEL[a.type] || a.type }),
    );
    if (needsValue) {
      label.appendChild(document.createTextNode(" · "));
      label.appendChild(el("span", { class: "text-slate-200", text: String(a.value) }));
    }
    row.appendChild(label);
    row.appendChild(el("button", { class: "chip", text: a.enabled ? "● ON" : "○ OFF",
      onclick: () => toggleAlertEnabled(a.id) }));
    row.appendChild(el("button", { class: "chip", text: "✕",
      onclick: () => { if (confirm("이 알림을 삭제할까요?")) removeAlert(a.id); } }));
    list.appendChild(row);
  }
}

// 셀 단위 평가 — 셀의 WS 콜백이 호출. 셀의 pair 와 매칭되는 alert 만 평가.
function evaluateAlertsForCell(cell, candle) {
  if (alerts.length === 0) return;
  const active = alerts.filter(a => a.enabled && a.pair === cell.pair);
  if (active.length === 0) return;

  const needRSI = active.some(a => a.type.startsWith("rsi_"));
  const needSMA20 = active.some(a => a.type.includes("sma20") || a.type.includes("_20_"));
  const needSMA50 = active.some(a => a.type.includes("sma50") || a.type.includes("_50_"));
  const needMACD = active.some(a => a.type.startsWith("macd_"));
  const needStoch = active.some(a => a.type.startsWith("stoch_"));

  let rsi = null, sma20 = null, sma50 = null, macdLast = null, signalLast = null, stochK = null, stochD = null;
  if (needRSI)   { const r = calcRSI(cell.candleData, 14); if (r.length) rsi = r[r.length - 1].value; }
  if (needSMA20) { const s = calcSMA(cell.candleData, 20); if (s.length) sma20 = s[s.length - 1].value; }
  if (needSMA50) { const s = calcSMA(cell.candleData, 50); if (s.length) sma50 = s[s.length - 1].value; }
  if (needMACD) {
    const m = calcMACD(cell.candleData, 12, 26, 9);
    if (m.macd.length)   macdLast   = m.macd[m.macd.length - 1].value;
    if (m.signal.length) signalLast = m.signal[m.signal.length - 1].value;
  }
  if (needStoch) {
    const s = calcStoch(cell.candleData, 14, 3);
    if (s.k.length) stochK = s.k[s.k.length - 1].value;
    if (s.d.length) stochD = s.d[s.d.length - 1].value;
  }
  const close = candle.close;

  for (const a of alerts) {
    if (!a.enabled || a.pair !== cell.pair) continue;
    let crossed = false; let triggerVal = null;
    switch (a.type) {
      case "price_above": case "price_below":
      case "rsi_above": case "rsi_below": {
        let curr = null;
        if (a.type === "price_above" || a.type === "price_below") curr = close; else curr = rsi;
        if (curr == null) break;
        const prev = a.lastVal; a.lastVal = curr;
        if (prev == null) break;
        if (a.type === "price_above" || a.type === "rsi_above") crossed = prev <= a.value && curr > a.value;
        else crossed = prev >= a.value && curr < a.value;
        triggerVal = curr; break;
      }
      case "price_cross_sma20_up": case "price_cross_sma20_down":
      case "price_cross_sma50_up": case "price_cross_sma50_down": {
        const smaVal = a.type.includes("sma20") ? sma20 : sma50;
        if (smaVal == null) break;
        const currDiff = close - smaVal;
        const prevDiff = a.lastDiff; a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type.endsWith("_up")) crossed = prevDiff <= 0 && currDiff > 0;
        else crossed = prevDiff >= 0 && currDiff < 0;
        triggerVal = close; break;
      }
      case "sma_golden_cross_20_50": case "sma_death_cross_20_50": {
        if (sma20 == null || sma50 == null) break;
        const currDiff = sma20 - sma50;
        const prevDiff = a.lastDiff; a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type === "sma_golden_cross_20_50") crossed = prevDiff <= 0 && currDiff > 0;
        else crossed = prevDiff >= 0 && currDiff < 0;
        triggerVal = sma20; break;
      }
      case "macd_cross_signal_up": case "macd_cross_signal_down": {
        if (macdLast == null || signalLast == null) break;
        const currDiff = macdLast - signalLast;
        const prevDiff = a.lastDiff; a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type === "macd_cross_signal_up") crossed = prevDiff <= 0 && currDiff > 0;
        else crossed = prevDiff >= 0 && currDiff < 0;
        triggerVal = macdLast; break;
      }
      case "macd_cross_zero_up": case "macd_cross_zero_down": {
        if (macdLast == null) break;
        const currDiff = macdLast;
        const prevDiff = a.lastDiff; a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type === "macd_cross_zero_up") crossed = prevDiff <= 0 && currDiff > 0;
        else crossed = prevDiff >= 0 && currDiff < 0;
        triggerVal = macdLast; break;
      }
      case "stoch_cross_d_up": case "stoch_cross_d_down": {
        if (stochK == null || stochD == null) break;
        const currDiff = stochK - stochD;
        const prevDiff = a.lastDiff; a.lastDiff = currDiff;
        if (prevDiff == null) break;
        if (a.type === "stoch_cross_d_up") crossed = prevDiff <= 0 && currDiff > 0;
        else crossed = prevDiff >= 0 && currDiff < 0;
        triggerVal = stochK; break;
      }
      case "stoch_overbought": case "stoch_oversold": {
        if (stochK == null) break;
        const threshold = (a.type === "stoch_overbought") ? 80 : 20;
        const curr = stochK;
        const prev = a.lastVal; a.lastVal = curr;
        if (prev == null) break;
        if (a.type === "stoch_overbought") crossed = prev <= threshold && curr > threshold;
        else crossed = prev >= threshold && curr < threshold;
        triggerVal = curr; break;
      }
    }
    if (crossed) {
      fireAlert(a, triggerVal == null ? 0 : triggerVal);
      a.enabled = false; saveAlerts(); renderAlertList();
    }
  }
}

function fireAlert(a, val) {
  const label = ALERT_TYPE_LABEL[a.type] || a.type;
  const msg = alertTypeNeedsValue(a.type)
    ? a.pair + " " + label + " " + String(a.value) + " 도달 (현재: " + val.toFixed(5) + ")"
    : a.pair + " " + label + " 발생 (현재: " + val.toFixed(5) + ")";
  if ("Notification" in window && Notification.permission === "granted") {
    try { new Notification("WTG Chart", { body: msg }); } catch (_) {}
  }
  showAlertBanner(msg);
  playBeep();
}

// 알림 소리 — Web Audio API 로 즉석 생성 (외부 파일 의존성 없음).
// 첫 user gesture 전에는 AudioContext 가 suspended 상태일 수 있으므로 resume 시도.
let alertSoundEnabled = (() => {
  try {
    const raw = localStorage.getItem(LS_ALERT_SOUND);
    return raw === null ? true : raw === "1";
  } catch (_) { return true; }
})();
function saveAlertSound() {
  try { localStorage.setItem(LS_ALERT_SOUND, alertSoundEnabled ? "1" : "0"); } catch (_) {}
}
let audioCtx = null;
function playBeep() {
  if (!alertSoundEnabled) return;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    if (!audioCtx) audioCtx = new Ctx();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine"; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(0.18, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.25);
  } catch (e) { console.warn("playBeep:", e); }
}
function refreshSoundBtn() {
  const btn = $("#alert-sound");
  btn.textContent = alertSoundEnabled ? "🔊" : "🔇";
  btn.dataset.active = alertSoundEnabled ? "true" : "false";
}
function showAlertBanner(msg) {
  const stack = $("#alert-banners");
  const div = el("div", { class: "panel p-3 text-sm flex items-start gap-2",
    style: { borderColor: "var(--accent)", background: "rgba(34,211,238,0.08)" } },
    el("div", { class: "flex-1", text: msg }),
  );
  div.appendChild(el("button", { class: "text-slate-400 hover:text-slate-200", text: "✕",
    onclick: () => div.remove() }));
  stack.appendChild(div);
  setTimeout(() => div.remove(), 10000);
}

function openAlertModal() {
  const active = layoutManager.activeCell();
  $("#am-pair-preview").textContent = active ? active.pair : "—";
  $("#am-type").value = "price_above";
  $("#am-value").value = "";
  $("#am-value-row").style.display = "";
  $("#alert-modal").classList.remove("hidden");
  $("#alert-modal").classList.add("flex");
}
function closeAlertModal() {
  $("#alert-modal").classList.add("hidden");
  $("#alert-modal").classList.remove("flex");
}
function refreshNotificationPermissionUI() {
  if (!("Notification" in window)) { $("#alert-perm-state").textContent = "(미지원)"; return; }
  const p = Notification.permission;
  $("#alert-perm-state").textContent =
    p === "granted" ? "허용됨" : p === "denied" ? "거부됨" : "미요청";
  $("#alert-perm-state").style.color =
    p === "granted" ? "var(--good)" : p === "denied" ? "var(--bad)" : "var(--text-muted)";
}

// ═════════════════════════════════════════════════════════════════════════════
// 전역 컨트롤 wiring + 초기화
// ═════════════════════════════════════════════════════════════════════════════
$$(".layout-btn").forEach(b => {
  b.addEventListener("click", () => layoutManager.setLayout(b.dataset.layout));
});
$("#alert-add").addEventListener("click", openAlertModal);
$("#alert-toggle-list").addEventListener("click", () => {
  $("#alert-list").classList.toggle("hidden");
});
$("#alert-sound").addEventListener("click", () => {
  alertSoundEnabled = !alertSoundEnabled;
  saveAlertSound();
  refreshSoundBtn();
  if (alertSoundEnabled) playBeep(); // 토글 직후 미리 듣기 — user gesture 라 AudioContext 도 자동 unlock.
});
$("#alert-permission").addEventListener("click", async () => {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    try { await Notification.requestPermission(); } catch (_) {}
  }
  refreshNotificationPermissionUI();
});
$("#am-save").addEventListener("click", () => {
  const t = $("#am-type").value;
  const active = layoutManager.activeCell();
  if (!active) { alert("활성 셀이 없습니다"); return; }
  if (alertTypeNeedsValue(t)) {
    const v = $("#am-value").value;
    if (!v || isNaN(Number(v))) { alert("임계값은 숫자여야 합니다"); return; }
    addAlert(t, Number(v), active.pair);
  } else {
    addAlert(t, 0, active.pair);
  }
  closeAlertModal();
});
$("#am-type").addEventListener("change", () => {
  $("#am-value-row").style.display = alertTypeNeedsValue($("#am-type").value) ? "" : "none";
});

window.addEventListener("resize", () => layoutManager.resizeAll());

// 초기화 — 저장된 설정 복원 + layout 적용.
loadAlerts();
renderAlertList();
refreshNotificationPermissionUI();
refreshSoundBtn();

(function init() {
  const s = loadSavedSettings();
  if (s && s.layout && s.cells) {
    layoutManager.setLayout(s.layout, s.cells);
  } else {
    layoutManager.setLayout("1");
  }
})();
</script>

</body>
</html>
