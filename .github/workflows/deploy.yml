# WTG — GHCR build + Self-hosted runner deploy.
#
# 흐름:
#   master push → test → build (linux/amd64, ubuntu-latest) → GHCR push
#              → deploy (self-hosted runner on EC2) → docker compose up
#
# 왜 self-hosted:
#   - EC2 는 private IP + 사내 CIDR 만 접근. GitHub-hosted runner 는 수천
#     public IP 대역이라 SG 관리 불가.
#   - self-hosted runner 는 사내 EC2 안에서 실행 → private IP 접근 OK,
#     SSH secrets 불필요, 방화벽 그대로.
#
# Runner 는 rocky (sudoer) 로 실행. deploy job 은 sudo -u winway 로 컨테이너
# 관리 (rocky 는 파일 배치 담당, winway 는 실 runtime).
#
# 필요 GitHub Secrets:
#   FIX_PUSH_SECRET  — mci-edge-fix drop copy 인증
#
# 이전에 필요했던 SSH_HOST / SSH_KEY / SSH_PORT 는 이제 불필요 (self-hosted).

name: Deploy to EC2

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'CLAUDE.md'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/wtg
  DEPLOY_USER: winway

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: staticcheck / vet / fmt
        run: make lint
      - name: unit + race
        run: make test-race

  build-and-push:
    name: Build & Push (GHCR)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: sha short
        id: meta
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2 (self-hosted)
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy files to winway home
        run: |
          set -euo pipefail
          sudo mkdir -p /home/${DEPLOY_USER}/wtg/deploy /home/${DEPLOY_USER}/wtg/etc
          sudo cp deploy/docker-compose.prod.yml /home/${DEPLOY_USER}/wtg/deploy/
          sudo cp -r etc/. /home/${DEPLOY_USER}/wtg/etc/
          sudo chown -R ${DEPLOY_USER}:${DEPLOY_USER} /home/${DEPLOY_USER}/wtg

      - name: Compose pull + up (as winway)
        env:
          WTG_VERSION_ENV: ${{ needs.build-and-push.outputs.image_sha }}
          FIX_PUSH_SECRET_ENV: ${{ secrets.FIX_PUSH_SECRET }}
        run: |
          set -euo pipefail
          # env 를 sudo 로 명시 전달 (sudoers env_reset 대응). heredoc 은 quoted
          # 라 outer shell (rocky) 은 확장 안 하고, inner bash 가 확장 → injection
          # 방어.
          sudo \
            WTG_VERSION_ENV="$WTG_VERSION_ENV" \
            FIX_PUSH_SECRET_ENV="$FIX_PUSH_SECRET_ENV" \
            -u "${DEPLOY_USER}" -H bash <<'REMOTE'
          set -euo pipefail
          cd ~/wtg
          cat > .env <<EOF
          WTG_VERSION=${WTG_VERSION_ENV}
          BROKER_HOST=127.0.0.1
          BROKER_PORT=11217
          FIX_PUSH_SECRET=${FIX_PUSH_SECRET_ENV}
          EOF
          chmod 600 .env

          docker compose -f deploy/docker-compose.prod.yml pull || {
            echo "pull 실패 — 기존 컨테이너 유지" >&2
            exit 1
          }
          docker compose -f deploy/docker-compose.prod.yml up -d
          docker image prune -f --filter "until=24h" || true
          REMOTE

      - name: Health check
        run: |
          sleep 30
          echo "=== health check ==="
          for url in \
            http://127.0.0.1:9090/ \
            http://127.0.0.1:8082/v1/price-stats \
            http://127.0.0.1:8083/metrics \
            http://127.0.0.1:5002/stats \
            http://127.0.0.1:5012/stats \
          ; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 3 "$url" || echo "ERR")
            printf "  %-45s HTTP %s\n" "$url" "$code"
          done
